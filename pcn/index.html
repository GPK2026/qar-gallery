<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="PCN"/>
  <meta name="description" content="Porsche Club Nürburgring — Digitale Clubplattform"/>
  <title>PCN — Digitale Clubplattform</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="pcn_manifest.json"/>

  <!-- Icons -->
  <link rel="apple-touch-icon" href="https://www.porsche-club-nuerburgring.de/PorscheClubs/pc_nuerburgring/pc_main.nsf/webclubprofile/ClubProfile/$file/clublogo_og.jpg"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><text y='.85em' x='10' font-size='80'>🏎️</text></svg>"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    html { overflow-x: hidden; }
    body {
      background: #0a0a0a;
      font-family: 'Barlow', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow-x: hidden;
    }

    /* ── Loading Screen ── */
    #loading {
      position: fixed; inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 9999;
      transition: opacity .5s ease;
    }
    /* Top red stripe — mirrors PCN website */
    #loading::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #e30613;
    }
    .l-logo {
      width: 220px;
      max-width: 68%;
      object-fit: contain;
      margin-bottom: 32px;
      filter: brightness(1.05);
    }
    .l-divider {
      width: 36px;
      height: 2px;
      background: #e30613;
      margin-bottom: 18px;
    }
    .l-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #333;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .l-bar {
      width: 140px;
      height: 2px;
      background: #1a1a1a;
      border-radius: 99px;
      overflow: hidden;
    }
    .l-fill {
      height: 100%;
      background: #e30613;
      border-radius: 99px;
      animation: lfill 2.5s ease-in-out forwards;
    }
    @keyframes lfill {
      0%   { width: 5%; }
      30%  { width: 45%; }
      70%  { width: 78%; }
      100% { width: 96%; }
    }

    /* ── Error state ── */
    .error-box {
      padding: 32px 24px;
      text-align: center;
      font-family: sans-serif;
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: #e30613; margin-bottom: 8px; }
    .error-msg { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.5; max-width: 300px; }
    .error-btn {
      background: #e30613; color: #fff; border: none;
      padding: 12px 28px; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
  </style>

  <!-- Google Fonts (same as PCN website uses Barlow) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script>
    // ── Cache-Selbstheilung ──────────────────────────────────────────────
    // iOS-PWAs und Safari halten alte Bundles teils hartnäckig fest. Wenn die
    // geladene Bundle-Version nicht zur Seite passt, einmalig hart neu laden.
    (function(){
      var expected = document.currentScript?.dataset?.v || "";
      window.__PCN_EXPECTED_V = expected;
      window.addEventListener("error", function(e){
        var msg = String(e?.message||"");
        // Typische Symptome eines veralteten Bundles
        if(!/Can't find variable|is not defined|undefined is not an object/.test(msg)) return;
        var key = "pcn_cache_reload";
        var last = 0;
        try { last = parseInt(sessionStorage.getItem(key)||"0"); } catch(_){}
        // Nur einmal pro Sitzung — sonst Endlosschleife
        if(Date.now() - last < 30000) return;
        try { sessionStorage.setItem(key, String(Date.now())); } catch(_){}
        console.warn("[PCN] Veraltetes Bundle erkannt — lade neu:", msg);
        // Caches leeren, falls vorhanden
        if(window.caches?.keys) {
          caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); })
            .finally(function(){ location.reload(true); });
        } else {
          location.reload(true);
        }
      }, true);
    })();
  </script>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <img class="l-logo"
      src="https://www.porsche-club-nuerburgring.de/PorscheClubs/pc_nuerburgring/pc_main.nsf/webclubprofile/ClubProfile/$file/clublogo_og.jpg"
      alt="Porsche Club Nürburgring"
      onerror="this.style.opacity='.2'"/>
    <div class="l-divider"></div>
    <div class="l-title">Digitale Clubplattform</div>
    <div class="l-bar"><div class="l-fill"></div></div>
  </div>

  <div id="root"></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    // Pre-load session before React mounts to avoid flash of splash screen
    try {
      const s = localStorage.getItem("pcn_session");
      if(s) {
        const u = JSON.parse(s);
        if(u && u.id) window.__PCN_PRELOAD_SESSION__ = u;
      }
    } catch(e) {}
  </script>
  <script src="pcn_config.js?v=1784878731"></script>

  <!-- PostHog Analytics (optional — loads only if key configured) -->
  <script>
    window.PCN_ANALYTICS_KEY = ""; // Add PostHog project key here when ready
    if(window.PCN_ANALYTICS_KEY) {
      !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]);t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.crossOrigin="anonymous",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+" (stub)"},o="capture identify alias people.set people.set_once set_config register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
      posthog.init(window.PCN_ANALYTICS_KEY, {api_host:"https://eu.posthog.com", autocapture:false});
    }
  </script>
  <!-- jsQR — bundled locally, no CDN needed -->
  <script src="jsQR.js?v=1784878731"></script>
  <!-- QR Code generator — bundled locally -->
  <script src="qrcode_bundle.js?v=1784878731"></script>
  <!-- Storage layer (load before app) -->
  <script src="pcn_storage.js?v=1784878731"></script>
  <!-- App -->
  <script src="PCN_MVP.compiled.js?v=1784878731"></script>

  <script>
    (function() {
      try {
        // Try multiple export patterns
        var App = null;
        if (window.PCN_MVP && typeof window.PCN_MVP.default === "function") {
          App = window.PCN_MVP.default;
        } else if (typeof window.PCN_MVP === "function") {
          App = window.PCN_MVP;
        } else if (typeof window.PCN === "function") {
          App = window.PCN;
        } else if (typeof window.PCNInner === "function") {
          App = window.PCNInner;
        }
        
        // Debug: log what we have
        console.log("[PCN] App load attempt:", typeof window.PCN_MVP, typeof App);
        
        if (!App) throw new Error('App konnte nicht geladen werden. PCN_MVP=' + typeof window.PCN_MVP);

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));

        // Fade out loading screen after first render
        setTimeout(function() {
          var el = document.getElementById('loading');
          if (el) {
            el.style.opacity = '0';
            setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
          }
        }, 300);

      } catch(e) {
        document.getElementById('loading').innerHTML = [
          '<div class="error-box">',
          '<div class="error-icon">⚠️</div>',
          '<div class="error-title">Ladefehler</div>',
          '<div class="error-msg">' + (e.message || 'Unbekannter Fehler') + '</div>',
          '<button class="error-btn" onclick="location.reload()">Neu laden</button>',
          '</div>'
        ].join('');
      }
    })();
  </script>
</body>
</html>
