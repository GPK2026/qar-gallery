<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PCN Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#D5001C;--dark:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--gold:#C8A96E;--blue:#6b7fff}
    body{background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;font-size:14px}
    #hdr{background:#fff;border-bottom:3px solid var(--red);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
    .hdr-lb{background:var(--red);padding:3px 8px;border-radius:4px;line-height:1.1}
    .hdr-lb div:first-child{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;color:rgba(255,255,255,.7);letter-spacing:1px}
    .hdr-lb div:last-child{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff}
    .hdr-badge{font-size:8px;background:var(--red);color:#fff;padding:1px 5px;border-radius:2px;font-weight:800}
    #tabbar{display:flex;background:#0a0a0a;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
    .tbt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;cursor:pointer;font-size:8px;font-weight:700;color:var(--muted);border:none;background:none;gap:2px;position:relative;font-family:'Barlow',sans-serif}
    .tbt span:first-child{font-size:18px}
    .tbt.active{color:var(--red)}
    .tbt-badge{position:absolute;top:3px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;min-width:14px;text-align:center}
    #sidebar{display:none}
    #layout{display:block}
    #main{padding:14px;padding-bottom:80px}
    @media(min-width:768px){
      #tabbar{display:none}
      #layout{display:flex;min-height:calc(100vh - 52px)}
      #sidebar{display:block;width:185px;background:#0a0a0a;border-right:1px solid var(--border);padding:10px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
      #main{padding:20px;padding-bottom:20px;flex:1}
      .nav-sec{font-size:9px;font-weight:800;color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;padding:12px 16px 4px}
      .nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-left:2px solid transparent}
      .nav-item:hover{color:var(--white);background:#111}
      .nav-item.active{color:var(--white);border-left-color:var(--red);background:#111}
      .nbadge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
    .sec-title{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;margin-bottom:16px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    @media(min-width:600px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
    .stat:hover{border-color:#333}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1}
    .stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .stat-sub{font-size:10px;margin-top:3px;color:var(--muted)}
    .stat-arrow{font-size:9px;color:var(--red);margin-top:3px;font-weight:700}
    input,select,textarea{background:#1a1a1a;border:1px solid var(--border);border-radius:7px;padding:10px 11px;color:var(--white);font-size:14px;font-family:'Barlow',sans-serif;outline:none;width:100%;-webkit-appearance:none}
    input:focus,select:focus,textarea:focus{border-color:var(--red)}
    .lbl{font-size:9px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .field{margin-bottom:12px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.g2{grid-template-columns:1fr}}
    .btn{background:var(--red);border:none;border-radius:7px;padding:10px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
    .btn:active{opacity:.8}
    .btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-green{background:#16a34a}
    .btn-amber{background:#d97706}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .b{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800;white-space:nowrap}
    .b-green{background:#16a34a22;color:var(--green);border:1px solid #16a34a33}
    .b-red{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
    .b-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b33}
    .b-gray{background:#22222244;color:var(--muted);border:1px solid var(--border)}
    .b-gold{background:#C8A96E22;color:var(--gold);border:1px solid #C8A96E44}
    .bar{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:5px}
    .bar-fill{height:100%;border-radius:3px}
    .mrow{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
    .chart-bar-row{display:flex;gap:4px;align-items:flex-end;height:100px}
    .chart-bar{flex:1;border-radius:4px 4px 0 0;min-width:16px;position:relative;cursor:default}
    .chart-bar:hover .chart-tip{display:block}
    .chart-tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:9px;padding:3px 6px;border-radius:4px;white-space:nowrap;margin-bottom:3px;z-index:10}
    .chart-labels{display:flex;gap:4px}
    .chart-label{flex:1;text-align:center;font-size:8px;color:var(--muted);margin-top:3px}
    #login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    #login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:340px}
    #toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;max-width:90vw}
    #toast.err{border-color:#ef4444;color:#ef4444}
    @media(min-width:768px){#toast{bottom:24px}}
    .hidden{display:none!important}
    .tgl-wrap{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .tgl{position:relative;width:44px;height:24px;flex-shrink:0}
    .tgl input{opacity:0;width:0;height:0;position:absolute}
    .tgl-slider{position:absolute;inset:0;background:#333;border-radius:12px;transition:.2s}
    .tgl-slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
    .tgl input:checked+.tgl-slider{background:var(--green)}
    .tgl input:checked+.tgl-slider:before{transform:translateX(20px)}
    .tier{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800}
    .t-bronze{background:#cd7f3222;color:#cd7f32;border:1px solid #cd7f3244}
    .t-silber{background:#aaa2;color:#aaa;border:1px solid #aaa4}
    .t-gold{background:#C8A96E22;color:var(--gold);border:1px solid #C8A96E44}
    .t-platin{background:#6b7fff22;color:var(--blue);border:1px solid #6b7fff44}
    .t-legend{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
  </style>
</head>
<body>

<!-- Login -->

  <div id="login-card">

<!-- App -->
<div id="app" class="hidden">
  <div id="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" style="height:30px;width:auto">
  <g transform="translate(2,2)">
    <rect x="0" y="0" width="32" height="44" rx="3" fill="#D5001C"/>
    <line x1="16" y1="2" x2="16" y2="42" stroke="#fff" stroke-width="1"/>
    <line x1="2" y1="18" x2="30" y2="18" stroke="#fff" stroke-width="1"/>
    <rect x="2" y="28" width="7" height="14" rx="1" fill="#111"/>
    <rect x="9" y="28" width="7" height="14" rx="1" fill="#D5001C"/>
    <rect x="16" y="28" width="7" height="14" rx="1" fill="#f5c000"/>
    <rect x="23" y="28" width="7" height="14" rx="1" fill="#111"/>

</svg>
      <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;color:#111">ADMIN</div><span class="hdr-badge">VORSTAND</span></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-ghost" style="border-color:#ddd;color:#555;font-size:11px" onclick="resetDemo()" title="Demo zurücksetzen">🔄 Demo</button>
      <button class="btn btn-sm btn-ghost" style="border-color:#ddd;color:#555;font-size:11px" onclick="loadAll()">↺</button>
      <button class="btn btn-sm btn-ghost" style="border-color:#ddd;color:#555;font-size:11px" onclick="doLogout()">✕</button>

  </div>
  <div id="layout">
    <nav id="sidebar">
      <div class="nav-sec">Übersicht</div>
      <div class="nav-item active" data-tab="dashboard" onclick="showTab('dashboard')">📊 Dashboard</div>
      <div class="nav-sec">Mitglieder</div>
      <div class="nav-item" data-tab="members" onclick="showTab('members')">👥 Mitglieder <span class="nbadge hidden" id="sb-guests"></span></div>
      <div class="nav-item" data-tab="payments" onclick="showTab('payments')">💳 Zahlungen <span class="nbadge hidden" id="sb-pay"></span></div>
      <div class="nav-item" data-tab="points" onclick="showTab('points')">🏆 Punkte</div>
      <div class="nav-sec">Events & Inhalt</div>
      <div class="nav-item" data-tab="events" onclick="showTab('events')">🏁 Events <span class="nbadge hidden" id="sb-ev"></span></div>
      <div class="nav-item" data-tab="content" onclick="showTab('content')">📰 Content</div>
      <div class="nav-sec">System</div>
      <div class="nav-item" data-tab="settings" onclick="showTab('settings')">⚙️ Einstellungen</div>

    <main id="main">
      <div id="tab-dashboard"></div>
      <div id="tab-members" class="hidden"></div>
      <div id="tab-payments" class="hidden"></div>
      <div id="tab-points" class="hidden"></div>
      <div id="tab-events" class="hidden"></div>
      <div id="tab-content" class="hidden"></div>
      <div id="tab-settings" class="hidden"></div>
    </main>
  </div>
  <div id="tabbar">
    <button class="tbt active" data-tab="dashboard" onclick="showTab('dashboard')"><span>📊</span><span>Dashboard</span></button>
    <button class="tbt" data-tab="members" onclick="showTab('members')"><span>👥</span><span>Mitglieder</span><span class="tbt-badge hidden" id="tb-guests"></span></button>
    <button class="tbt" data-tab="payments" onclick="showTab('payments')"><span>💳</span><span>Zahlungen</span><span class="tbt-badge hidden" id="tb-pay"></span></button>
    <button class="tbt" data-tab="events" onclick="showTab('events')"><span>🏁</span><span>Events</span><span class="tbt-badge hidden" id="tb-ev"></span></button>
    <button class="tbt" data-tab="points" onclick="showTab('points')"><span>🏆</span><span>Punkte</span></button>
    <button class="tbt" data-tab="content" onclick="showTab('content')"><span>📰</span><span>Content</span></button>
  </div>
</div>
<div id="toast"></div>
<script>
const SB="https://xsyuhfleesstrchcwspg.supabase.co/rest/v1";
const KEY=atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW5oemVYVm9abXhsWlhOemRISmphR04zYzNCbklpd2ljbTlzWlNJNkluTmxjblpwWTJWZmNtOXNaU0lzSW1saGRDSTZNVGM0TWpjek1EWTFPU3dpWlhod0lqb3lNRGs0TXpBMk5qVTVmUS5rQnFyVzk3N1pqTWZySFY1blJsMnpid3ZiSUczVzhUXy14MVdsZGl1alFj");
const ADMIN="PCN-ADMIN-2026";
const EUR=95;
const TIERS=[{n:"Bronze",p:100},{n:"Silber",p:300},{n:"Gold",p:600},{n:"Platin",p:1000},{n:"Legend",p:2000}];
let DB={members:[],events:[],vehicles:[],participants:[]};
let currentTab="dashboard";

function doLogin(){
  if(document.getElementById("code-inp").value.trim().toUpperCase()===ADMIN){
    sessionStorage.setItem("pcn_adm","1");
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app").classList.remove("hidden");
    loadAll();
  } else toast("Falscher Code","err");
}
function doLogout(){sessionStorage.removeItem("pcn_adm");location.reload();}

async function api(path,opts={}){
  try{
    const r=await fetch(SB+"/"+path,{...opts,headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=representation",...(opts.headers||{})}});
    const d=await r.json().catch(()=>({}));
    return r.ok?{data:d}:{data:null,error:d};
  }catch(e){return{data:null,error:e.message};}
}

async function loadAll(){
  toast("Lädt…");
  try{
    const [m,e,v,p]=await Promise.all([
      api("users?select=*&order=created_at.desc&limit=200"),
      api("events?select=*&order=date.asc&limit=100"),
      api("vehicles?select=*&order=created_at.desc&limit=200"),
      api("participants?select=*&order=registered_at.desc&limit=500"),
    ]);
    if(m.data&&Array.isArray(m.data)) DB.members=m.data;
    if(e.data&&Array.isArray(e.data)) DB.events=e.data;
    if(v.data&&Array.isArray(v.data)) DB.vehicles=v.data;
    if(p.data&&Array.isArray(p.data)) DB.participants=p.data;
    updateBadges(); renderTab(currentTab);
    toast(`✓ ${DB.members.length} Mitglieder · ${DB.events.length} Events`);
  }catch(err){toast("Ladefehler","err"); renderTab(currentTab);}
}

function updateBadges(){
  const g=DB.members.filter(m=>m.role==="guest").length;
  const p=DB.members.filter(m=>m.role==="member"&&!m.beitrag_bezahlt).length;
  const pe=DB.participants.filter(p=>p.status==="pending").length;
  [["sb-guests","tb-guests",g],["sb-pay","tb-pay",p],["sb-ev","tb-ev",pe]].forEach(([s,t,n])=>{
    [s,t].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=n;el.classList.toggle("hidden",!n);}});
  });
}

function showTab(id){
  currentTab=id;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.dataset.tab===id));
  document.querySelectorAll(".tbt").forEach(el=>el.classList.toggle("active",el.dataset.tab===id));
  document.querySelectorAll("[id^='tab-']").forEach(el=>el.classList.add("hidden"));
  const el=document.getElementById("tab-"+id);
  if(el){el.classList.remove("hidden");renderTab(id);}
  document.getElementById("main").scrollTop=0;
}
function renderTab(id){
  const el=document.getElementById("tab-"+id);
  if(!el||el.classList.contains("hidden")) return;
  ({dashboard:rDashboard,members:rMembers,payments:rPayments,points:rPoints,events:rEvents,content:rContent,settings:rSettings}[id]||function(){})(el);
}

const fmt=d=>d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"2-digit"}):"—";
const fmtDate=d=>d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"}):"—";
const daysLeft=d=>Math.ceil((new Date(d)-new Date())/86400000);
function toast(msg,type="ok"){const el=document.getElementById("toast");el.textContent=msg;el.className=type==="err"?"err":"";el.style.display="block";clearTimeout(el._t);el._t=setTimeout(()=>el.style.display="none",3200);}
function stat(val,lbl,sub,col,tab){return `<div class="stat" ${tab?`onclick="showTab('${tab}')"`:''}><div class="stat-val" style="color:${col}">${val}</div><div class="stat-lbl">${lbl}</div><div class="stat-sub">${sub}</div>${tab?`<div class="stat-arrow">→ ${tab}</div>`:''}</div>`;}
function calcPts(id){const v=DB.vehicles.filter(x=>x.user_id===id).length;const c=DB.participants.filter(x=>x.user_id===id&&x.status==="confirmed").length;return v*50+c*100;}
function getTier(pts){return TIERS.filter(t=>pts>=t.p).slice(-1)[0]||null;}
function tierBadge(pts){const t=getTier(pts);return t?`<span class="tier t-${t.n.toLowerCase()}">${t.n}</span>`:`<span class="b b-gray">—</span>`;}

function rDashboard(el){
  const aktive=DB.members.filter(m=>m.role==="member");
  const gaeste=DB.members.filter(m=>m.role==="guest");
  const bezahlt=aktive.filter(m=>m.beitrag_bezahlt);
  const offen=aktive.filter(m=>!m.beitrag_bezahlt);
  const pct=aktive.length?Math.round(bezahlt.length/aktive.length*100):0;
  const next=DB.events.filter(e=>new Date(e.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const pending=DB.participants.filter(p=>p.status==="pending");
  const confirmed=DB.participants.filter(p=>p.status==="confirmed");
  const d30=new Date(Date.now()-30*864e5);
  const newM=DB.members.filter(m=>m.created_at&&new Date(m.created_at)>d30);
  const beitragsE=bezahlt.length*EUR;
  const eventE=confirmed.reduce((sum,p)=>{const ev=DB.events.find(e=>e.id===p.event_id);const fee=parseFloat((ev?.entry_fee||"0").replace(/[^0-9.]/g,""))||0;return sum+fee;},0);
  const gesamt=beitragsE+eventE;

  // 6-month chart
  const months=[];

  <div class="card" style="margin-bottom:12px">

// Actions
async function togglePaid(id,isPaid){
  // Optimistic update — update local state immediately
  DB.members = DB.members.map(m=>m.id===id?{...m,beitrag_bezahlt:!isPaid}:m);
  updateBadges(); renderTab(currentTab);
  // Then persist to DB
  const{error}=await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:!isPaid})});
  if(error){
    // Revert on error
    DB.members = DB.members.map(m=>m.id===id?{...m,beitrag_bezahlt:isPaid}:m);
    toast("Fehler: Konnte nicht gespeichert werden","err");
    updateBadges(); renderTab(currentTab);
    return;
  }
  if(!isPaid) sendAdminMsg(id,"Dein Mitgliedsbeitrag "+new Date().getFullYear()+" wurde als bezahlt verbucht. Vielen Dank!","💳");
  toast(isPaid?"Offen markiert":"✓ Bezahlt verbucht");
}
async function toggleRole(id,isMember){
  // Optimistic update
  DB.members = DB.members.map(m=>m.id===id?{...m,role:isMember?"guest":"member"}:m);
  updateBadges(); renderTab(currentTab);
  const{error}=await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({role:isMember?"guest":"member"})});
  if(error){
    DB.members = DB.members.map(m=>m.id===id?{...m,role:isMember?"member":"guest"}:m);
    toast("Fehler","err"); updateBadges(); renderTab(currentTab);
    return;
  }
  if(!isMember) sendAdminMsg(id,"Willkommen als Mitglied im Porsche Club Nürburgring! 🏎️ Dein Konto wurde freigeschaltet.","🎉");
  toast(isMember?"Als Gast gesetzt":"✓ Mitglied freigegeben + Nachricht");
}
async function upgradeMember(id){
  await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({role:"member"})});
  sendAdminMsg(id,"Willkommen als Mitglied im Porsche Club Nürburgring! 🏎️ Dein Konto wurde freigeschaltet.","🎉");
  toast("✓ Mitglied freigegeben"); await loadAll();
}
async function confirmParticipant(partId,eventId){
  await api(`participants?id=eq.${partId}`,{method:"PATCH",body:JSON.stringify({status:"confirmed"})});
  const part=DB.participants.find(p=>p.id===partId),ev=DB.events.find(e=>e.id===eventId),veh=DB.vehicles.find(v=>v.id===part?.vehicle_id);
  if(part?.user_id&&ev) sendAdminMsg(part.user_id,`Deine Anmeldung für "${ev.name}" wurde bestätigt! 🏁`+(veh?` Fahrzeug: ${veh.hersteller} ${veh.modell}.`:"")+" Wir freuen uns auf dich!","✅");
  toast("✓ Bestätigt + Nachricht gesendet"); await loadAll();
}
async function cancelParticipant(partId,eventId){
  if(!confirm("Anmeldung stornieren?")) return;
  await api(`participants?id=eq.${partId}`,{method:"PATCH",body:JSON.stringify({status:"cancelled"})});
  const part=DB.participants.find(p=>p.id===partId),ev=DB.events.find(e=>e.id===eventId);
  if(part?.user_id&&ev) sendAdminMsg(part.user_id,`Deine Anmeldung für "${ev.name}" wurde leider storniert.`,"❌");
  toast("Storniert + Nachricht gesendet"); await loadAll();
}
async function delMember(id,name){if(!confirm(`${name} löschen?`)) return;await api(`users?id=eq.${id}`,{method:"DELETE"});toast("Gelöscht");await loadAll();}

function toggleEvForm(){
  const f=document.getElementById("ev-form");f.classList.toggle("hidden");
  if(!f.classList.contains("hidden")){
    document.getElementById("ev-edit-id").value="";
    document.getElementById("ev-form-title").textContent="Neues Event";
    document.getElementById("ev-save-btn").textContent="✓ Erstellen";
    ["ev-name","ev-loc","ev-fee","ev-desc"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    const mx=document.getElementById("ev-max");if(mx)mx.value="50";
    const dt=document.getElementById("ev-date");if(dt)dt.value="";
  }
}
function editEvent(id){
  const ev=DB.events.find(e=>e.id===id);if(!ev) return;
  const f=document.getElementById("ev-form");f.classList.remove("hidden");
  document.getElementById("ev-form-title").textContent="Event bearbeiten";
  document.getElementById("ev-save-btn").textContent="✓ Speichern";
  document.getElementById("ev-edit-id").value=id;
  document.getElementById("ev-name").value=ev.name||"";
  document.getElementById("ev-date").value=ev.date||"";
  document.getElementById("ev-loc").value=ev.location||"";
  document.getElementById("ev-cat").value=ev.category||"Clubabend";
  document.getElementById("ev-fee").value=ev.entry_fee||"";
  document.getElementById("ev-max").value=ev.max_participants||50;
  document.getElementById("ev-desc").value=ev.description||"";
  f.scrollIntoView({behavior:"smooth"});
}
async function saveEvent(){
  const name=document.getElementById("ev-name")?.value?.trim();
  const date=document.getElementById("ev-date")?.value;
  if(!name||!date){toast("Name + Datum erforderlich","err");return;}
  const editId=document.getElementById("ev-edit-id")?.value;
  const payload={name,date,location:document.getElementById("ev-loc")?.value,category:document.getElementById("ev-cat")?.value,entry_fee:document.getElementById("ev-fee")?.value,max_participants:parseInt(document.getElementById("ev-max")?.value)||50,description:document.getElementById("ev-desc")?.value};
  if(editId){await api(`events?id=eq.${editId}`,{method:"PATCH",body:JSON.stringify(payload)});toast("✓ Event aktualisiert — App lädt beim nächsten Login");}
  else{await api("events",{method:"POST",body:JSON.stringify({...payload,created_at:new Date().toISOString()})});toast("✓ Event erstellt");}
  toggleEvForm(); await loadAll();
}
async function delEvent(id,name){if(!confirm(`"${name}" löschen?`)) return;await api(`events?id=eq.${id}`,{method:"DELETE"});toast("Gelöscht");await loadAll();}

const TEMPLATES = [
  {t:"Clubabend-Erinnerung", b:"Liebe Mitglieder,\n\nnächsten [WOCHENTAG] findet unser monatlicher Clubabend im Kesselchen statt — ab [UHRZEIT] Uhr.\n\nBis bald,\nEuer PCN-Vorstand"},
  {t:"TrackDay-Anmeldung", b:"Liebe Motorsport-Freunde,\n\ndie Anmeldung für den [DATUM] TrackDay auf der [STRECKE] ist offen!\n\nMax. [ANZAHL] Plätze · [PREIS]\n\nJetzt in der App anmelden!"},
  {t:"Allgemeine Ankündigung", b:"Liebe Mitglieder,\n\n[INHALT]\n\nMit sportlichen Grüßen,\nEuer PCN-Vorstand"},
];
function useTpl(idx){
  const tpl=TEMPLATES[idx]; if(!tpl) return;
  const s=document.getElementById("nl-sub"),b=document.getElementById("nl-body");
  if(s)s.value=tpl.t; if(b)b.value=tpl.b;
  toast("Template eingefügt — bitte [PLATZHALTER] ersetzen");
}
async function publishNL(){
  const sub=document.getElementById("nl-sub")?.value,body=document.getElementById("nl-body")?.value;
  if(!sub||!body){toast("Betreff + Inhalt erforderlich","err");return;}
  if(!confirm("Newsletter veröffentlichen?")) return;
  await api("news",{method:"POST",body:JSON.stringify({title:sub,body,type:"newsletter",icon:"📬",pinned:true,created_at:new Date().toISOString(),author:"PCN Vorstand"})}).catch(()=>{});
  toast("✓ Newsletter veröffentlicht · erscheint im App-Feed");
}
async function publishNews(){
  const title=document.getElementById("nf-title")?.value,body=document.getElementById("nf-body")?.value;
  const type=document.getElementById("nf-type")?.value||"news",pinned=document.getElementById("nf-pin")?.checked;
  if(!title){toast("Titel erforderlich","err");return;}
  await api("news",{method:"POST",body:JSON.stringify({title,body,type,pinned,icon:type==="news"?"📰":type==="tip"?"💡":"🎉",created_at:new Date().toISOString(),author:"PCN Vorstand"})}).catch(()=>{});
  toast("✓ Artikel veröffentlicht");
  ["nf-title","nf-body"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
}
function exportCSV(){
  const a=DB.members.filter(m=>m.role==="member");
  const rows=[["Name","E-Mail","Nr.","Status","Betrag"],...a.map(m=>[m.name||"",m.email||"",m.member_nr||"",m.beitrag_bezahlt?"Bezahlt":"Offen",EUR+" EUR"])];
  const el=document.createElement("a");el.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(";")).join("\n"));el.download="PCN_Beitraege_2026.csv";el.click();
  toast("✓ CSV exportiert");
}
async function resetDemo(){
  if(!confirm("Demo-Daten zurücksetzen?\n\nDies löscht Demo-Chat und -Teilnehmer aus der DB.")) return;
  toast("Setze zurück…");
  await api("messages?thread_id=eq.a1b2c3d4-e5f6-7890-abcd-ef1234567890",{method:"DELETE"}).catch(()=>{});
  await api("threads?id=eq.a1b2c3d4-e5f6-7890-abcd-ef1234567890",{method:"DELETE"}).catch(()=>{});
  for(const id of ["a0000000-0000-0000-0000-000000000001","u1"]){
    await api(`participants?user_id=eq.${id}`,{method:"DELETE"}).catch(()=>{});
  }
  toast("✓ Demo zurückgesetzt — App neu laden");
}
async function sendAdminMsg(userId,text,icon="📋"){
  const threadId="admin-"+userId;
  try{
    const ex=await api("threads?id=eq."+threadId);
    if(!ex.data?.length) await api("threads",{method:"POST",body:JSON.stringify({id:threadId,participants:[userId],vehicle_name:"Admin-Mitteilungen",anonymous:false,created_at:new Date().toISOString()})});
    await api("messages",{method:"POST",body:JSON.stringify({thread_id:threadId,from_id:"00000000-0000-0000-0000-000000000000",text:icon+" "+text,is_system:true,created_at:new Date().toISOString()})});
  }catch(e){}
}
if(sessionStorage.getItem("pcn_adm")==="1"){
  document.getElementById("login-wrap").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  loadAll();
}
