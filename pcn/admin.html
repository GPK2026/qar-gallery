<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PCN Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#D5001C;--dark:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--gold:#C8A96E;--blue:#6b7fff}
    body{background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;font-size:14px}

    /* ── Header ── */
    #hdr{background:#fff;border-bottom:3px solid var(--red);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
    .hdr-logo{height:30px;object-fit:contain}
    .htitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;color:#111;line-height:1}
    .hbadge{font-size:8px;background:var(--red);color:#fff;padding:1px 5px;border-radius:2px;font-weight:800}

    /* ── Bottom Tab Bar (mobile) ── */
    #tabbar{display:flex;background:#0a0a0a;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
    .tbt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;cursor:pointer;font-size:9px;font-weight:700;color:var(--muted);border:none;background:none;gap:2px;transition:color .1s;position:relative}
    .tbt span:first-child{font-size:20px}
    .tbt.active{color:var(--red)}
    .tbt-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;min-width:14px;text-align:center}

    /* ── Sidebar (desktop only) ── */
    #sidebar{display:none}

    /* ── Main ── */
    #layout{display:block}
    #main{padding:14px;padding-bottom:80px;overflow-y:auto;min-height:calc(100vh - 52px)}

    /* ── Desktop ── */
    @media(min-width:768px){
      #tabbar{display:none}
      #layout{display:flex;min-height:calc(100vh - 52px)}
      #sidebar{display:block;width:190px;background:#0a0a0a;border-right:1px solid var(--border);padding:10px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
      #main{padding:20px;padding-bottom:20px;flex:1;overflow-y:auto}
      .nav-sec{font-size:9px;font-weight:800;color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;padding:12px 16px 4px}
      .nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-left:2px solid transparent;transition:all .1s}
      .nav-item:hover{color:var(--white);background:#111}
      .nav-item.active{color:var(--white);border-left-color:var(--red);background:#111}
      .nbadge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto}
    }

    /* ── Cards ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
    .sec-title{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;margin-bottom:16px}

    /* ── Stats ── */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    @media(min-width:600px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:900px){.stat-grid{grid-template-columns:repeat(6,1fr)}}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1}
    .stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .stat-sub{font-size:10px;margin-top:4px;color:var(--muted)}

    /* ── Table — horizontal scroll on mobile ── */
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;min-width:400px}
    th{text-align:left;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:9px 8px;border-bottom:1px solid #131313;vertical-align:middle;font-size:12px}
    tr:hover td{background:#0d0d0d}

    /* ── Badges ── */
    .b{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800;white-space:nowrap}
    .b-green{background:#16a34a22;color:var(--green);border:1px solid #16a34a33}
    .b-red{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
    .b-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b33}
    .b-gray{background:#22222244;color:var(--muted);border:1px solid var(--border)}
    .b-gold{background:#C8A96E22;color:var(--gold);border:1px solid #C8A96E44}
    .b-blue{background:#6b7fff22;color:var(--blue);border:1px solid #6b7fff33}

    /* ── Form ── */
    input,select,textarea{background:#1a1a1a;border:1px solid var(--border);border-radius:7px;padding:10px 11px;color:var(--white);font-size:14px;font-family:'Barlow',sans-serif;outline:none;width:100%;-webkit-appearance:none}
    input:focus,select:focus,textarea:focus{border-color:var(--red)}
    label{font-size:9px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .field{margin-bottom:12px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.g2{grid-template-columns:1fr}}

    /* ── Buttons ── */
    .btn{background:var(--red);border:none;border-radius:7px;padding:10px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;-webkit-tap-highlight-color:transparent}
    .btn:active{opacity:.8}
    .btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-green{background:#16a34a}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    /* ── Bar ── */
    .bar{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:5px}
    .bar-fill{height:100%;border-radius:3px;transition:width .6s}

    /* ── Member row (mobile-friendly) ── */
    .member-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
    .member-row-top{display:flex;gap:10px;align-items:center;margin-bottom:8px}
    .member-avatar{width:36px;height:36px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
    .member-row-actions{display:flex;gap:6px;flex-wrap:wrap}

    /* ── Login ── */
    #login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    #login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:340px}

    /* ── Toast ── */
    #toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;max-width:90vw}
    #toast.err{border-color:#ef4444;color:#ef4444}
    @media(min-width:768px){#toast{bottom:24px}}
    .hidden{display:none!important}

    /* ── Divider ── */
    .divider{height:1px;background:var(--border);margin:12px 0}

    /* Points bar */
    .pts-bar{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-top:4px}
    .pts-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px}
    /* Toggle switch */
    .toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
    .toggle{position:relative;width:48px;height:26px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .toggle-slider{position:absolute;inset:0;background:#333;border-radius:13px;transition:.2s;cursor:pointer}
    .toggle-slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
    input:checked+.toggle-slider{background:var(--green)}
    input:checked+.toggle-slider:before{transform:translateX(22px)}
    .toggle-label{font-size:12px;font-weight:700}
  </style>
</head>

<script>
const SB   = "https://xsyuhfleesstrchcwspg.supabase.co/rest/v1";
const KEY_PUB = "sb_publishable_xmmKWwXaQliEBAOIFPM8ig_srQP3zED";
const KEY_SVC = atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW5oemVYVm9abXhsWlhOemRISmphR04zYzNCbklpd2ljbTlzWlNJNkluTmxjblpwWTJWZmNtOXNaU0lzSW1saGRDSTZNVGM0TWpjek1EWTFPU3dpWlhod0lqb3lNRGs0TXpBMk5qVTVmUS5rQnFyVzk3N1pqTWZySFY1blJsMnpid3ZiSUczVzhUXy14MVdsZGl1alFj");
const ADMIN= "PCN-ADMIN-2026";
const EUR  = 95;

let DB = {members:[],events:[],vehicles:[],participants:[]};
let currentTab = "dashboard";
let SERVICE_KEY = KEY_SVC; // Always use service key in admin

async function api(path, opts={}) {
  try {
    const r = await fetch(SB+"/"+path, {
      ...opts,
      headers:{"apikey":KEY_SVC,"Authorization":"Bearer "+KEY_SVC,"Content-Type":"application/json","Prefer":"return=representation",...(opts.headers||{})}
    });
    const d = await r.json().catch(()=>({}));
    return r.ok ? {data:d} : {data:null,error:d};
  } catch(e){ return {data:null,error:e.message}; }
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function doLogin() {
  if(document.getElementById("code-inp").value.trim().toUpperCase()===ADMIN) {
    sessionStorage.setItem("pcn_adm","1");
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app").classList.remove("hidden");
    loadAll();
  } else toast("Falscher Code","err");
}
function doLogout(){ sessionStorage.removeItem("pcn_adm"); location.reload(); }

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  toast("Lädt…");
  try {
    const [m,e,v,p] = await Promise.all([
      api("users?select=*&order=created_at.desc&limit=200"),
      api("events?select=*&order=date.asc&limit=100"),
      api("vehicles?select=*&order=created_at.desc&limit=200"),
      api("participants?select=*&order=registered_at.desc&limit=500"),
    ]);

    // Auth error — only show dialog if not already authenticated
    if(!m.data || !Array.isArray(m.data)) {
      const errCode = m.error?.code || m.error?.message || "";
      // 401/403 = auth problem, show key dialog
      if(errCode.includes("401") || errCode.includes("403") || errCode.includes("JWTExpired") || errCode.includes("invalid") || !SERVICE_KEY || !SERVICE_KEY.startsWith("eyJ")) {
        showKeyDialog(JSON.stringify(m.error||"Auth Fehler"));
      } else {
        toast("Fehler: "+JSON.stringify(m.error),"err");
        renderTab(currentTab);
      }
      return;
    }

    DB.members      = m.data || [];
    DB.events       = e.data || [];
    DB.vehicles     = v.data || [];
    DB.participants = p.data || [];
    updateBadges();
    renderTab(currentTab);
    toast(`✓ ${DB.members.length} Mitglieder · ${DB.vehicles.length} Fahrzeuge`);
  } catch(err) {
    toast("Netzwerkfehler: "+err.message,"err");
    renderTab(currentTab);
  }
}

  if(existing) existing.remove();
  const d = document.createElement("div");
  d.id = "key-dialog";
  d.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML = `
    <div style="background:#111;border:1px solid #333;border-radius:14px;padding:28px;width:100%;max-width:420px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;margin-bottom:8px">🔑 Supabase API-Key</div>
      <div style="font-size:12px;color:#666;margin-bottom:16px">Fehler: ${errMsg}</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:12px;line-height:1.6">
        Gehe zu: <b style="color:#fff">Supabase → Project Settings → API</b><br>
        Kopiere den <b style="color:#fff">service_role</b> JWT Token (beginnt mit <code style="color:#C8A96E">eyJ...</code>)
      </div>

function applyKey() {
  const k = document.getElementById("key-input")?.value.trim();
  if(!k || !k.startsWith("eyJ")) return toast("Ungültiger Key — muss mit eyJ beginnen","err");
  SERVICE_KEY = k;
  sessionStorage.setItem("pcn_svc_key", k);
  document.getElementById("key-dialog")?.remove();
  loadAll();
}

function updateBadges() {
  const g = DB.members.filter(m=>m.role==="guest").length;
  const p = DB.members.filter(m=>m.role==="member"&&!m.beitrag_bezahlt).length;
  ["sb-guests","tb-guests"].forEach(id=>{ const el=document.getElementById(id); if(el){el.textContent=g;el.style.display=g?"":"none";} });

// ── Nav ───────────────────────────────────────────────────────────────────────
function showTab(id) {
  currentTab = id;
  // Desktop sidebar
  document.querySelectorAll(".nav-item").forEach(el=>{
    el.classList.toggle("active", el.dataset.tab===id);
  });
  // Mobile tabbar
  document.querySelectorAll(".tbt").forEach(el=>{
    el.classList.toggle("active", el.dataset.tab===id);
  });
  // Show/hide content
  document.querySelectorAll("[id^='tab-']").forEach(el=>el.classList.add("hidden"));
  const el = document.getElementById("tab-"+id);
  if(el) { el.classList.remove("hidden"); renderTab(id); }
  // Scroll to top
  document.getElementById("main").scrollTop = 0;
}
function renderTab(id) {
  const el = document.getElementById("tab-"+id);
  if(!el||el.classList.contains("hidden")) return;
  ({dashboard:rDashboard,activity:rActivity,members:rMembers,payments:rPayments,
    points:rPoints,vehicles:rVehicles,events:rEvents,newsletter:rNewsletter,
    newsfeed:rNewsfeed,settings:rSettings}[id]||function(){})(el);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt = d => d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"2-digit"}):"—";
const fmtDate = d => d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"}):"—";
const daysLeft = d => Math.ceil((new Date(d)-new Date())/86400000);
function toast(msg,type="ok") {
  const el=document.getElementById("toast");
  el.textContent=msg; el.className=type==="err"?"err":"";
  el.style.display="block"; clearTimeout(el._t); el._t=setTimeout(()=>el.style.display="none",3000);
}
function stat(val,lbl,sub,col) {
  return `<div class="stat"><div class="stat-val" style="color:${col}">${val}</div><div class="stat-lbl">${lbl}</div><div class="stat-sub">${sub}</div></div>`;
}

function calcMemberPoints(memberId) {
  const veh = DB.vehicles.filter(v=>v.user_id===memberId).length;

    <div class="member-row">
      <div style="display:flex;gap:10px;align-items:center">
        ${v.image?`<div style="width:56px;height:40px;border-radius:4px;overflow:hidden;flex-shrink:0"><img src="${v.image}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`:""}
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700">${v.hersteller||""} ${v.modell||""}</div>
          <div style="font-size:11px;color:var(--muted)">${v.baujahr||""} · ${v.farbe||""} · ${v.kennzeichen||""}</div>
          <div style="font-size:10px;color:var(--muted);font-family:monospace;margin-top:2px">${v.qar_id||""} · ${v.kilometerstand?parseInt(v.kilometerstand).toLocaleString("de-DE")+" km":"—"}</div>
        </div>
      </div>
    </div>`).join("")||`<div style="color:var(--muted);text-align:center;padding:20px">Keine Ergebnisse</div>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function rEvents(el) {
  const sorted=[...DB.events].sort((a,b)=>new Date(a.date)-new Date(b.date));
  el.innerHTML=`
    <div class="page-title">🏁 Events</div>
    <button class="btn" style="margin-bottom:12px;width:100%" onclick="toggleNewEvent()">+ Neues Event</button>
    <div id="ev-form" class="card hidden" style="margin-bottom:12px">
      <div class="sec-title">Neues Event</div>
      <div class="g2">
        <div class="field"><label>Name *</label><input id="ev-name"></div>
        <div class="field"><label>Datum *</label><input id="ev-date" type="date"></div>
        <div class="field"><label>Ort</label><input id="ev-loc"></div>
        <div class="field"><label>Kategorie</label><select id="ev-cat">
          <option>Clubabend</option><option>Trackday</option><option>Ausfahrt</option>
          <option>Oldtimer</option><option>Rennsport</option><option>Saisonfahrt</option>
        </select></div>
        <div class="field"><label>Preis</label><input id="ev-price" placeholder="€ 95 / Kostenlos"></div>
      </div>
      <div class="field"><label>Beschreibung</label><textarea id="ev-desc" style="min-height:60px"></textarea></div>
      <div class="row"><button class="btn" onclick="createEvent()">✓ Erstellen</button><button class="btn btn-ghost" onclick="toggleNewEvent()">Abbrechen</button></div>
    </div>
    ${sorted.map(ev=>{
      const past=new Date(ev.date)<new Date(), dl=daysLeft(ev.date);
      const col=past?"var(--muted)":dl<=7?"#ef4444":dl<=30?"var(--amber)":"var(--green)";
      return `<div class="member-row">
        <div style="display:flex;gap:10px;align-items:center">
          <div style="min-width:36px;text-align:center">
            <div style="font-size:20px;font-weight:900;color:var(--red);font-family:'Barlow Condensed',sans-serif;line-height:1">${new Date(ev.date).getDate()}</div>
            <div style="font-size:8px;color:var(--muted);text-transform:uppercase">${new Date(ev.date).toLocaleString("de-DE",{month:"short"})}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700">${ev.name}</div>
            <div style="font-size:11px;color:var(--muted)">${ev.location||""} · ${ev.category||""}</div>
            ${(()=>{
              const parts = DB.participants.filter(p=>p.event_id===ev.id);
              const confirmed = parts.filter(p=>p.status==="confirmed").length;
              const pending = parts.filter(p=>p.status==="pending").length;
              const cancelled = parts.filter(p=>p.status==="cancelled").length;
              if(!parts.length) return '<div style="font-size:10px;color:var(--muted);margin-top:2px">Keine Anmeldungen</div>';
              return '<div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">'
                + (confirmed?'<span class="b b-green" style="font-size:9px">✓ '+confirmed+' best.</span>':"")
                + (pending?'<span class="b b-amber" style="font-size:9px">🟡 '+pending+' offen</span>':"")
                + (cancelled?'<span class="b b-gray" style="font-size:9px">✕ '+cancelled+'</span>':"")
                + '</div>';
            })()}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
            <span class="b" style="background:${col}22;color:${col};border:1px solid ${col}44">${past?"Abgesch.":dl<=7?"Bald":"Geplant"}</span>
            <button class="btn btn-sm" style="background:#ef444422;color:#ef4444;border:1px solid #ef444433;font-size:10px" onclick="delEvent('${ev.id}','${(ev.name||"").replace(/'/g,"\\'")}')">✕</button>
          </div>
        </div>
      </div>`;}).join("")||`<div style="color:var(--muted);text-align:center;padding:20px">Keine Events</div>`}`;
}

// ── Newsletter ────────────────────────────────────────────────────────────────
function rNewsletter(el) {
  const n=DB.members.filter(m=>m.role==="member").length;
  el.innerHTML=`
    <div class="page-title">📬 Newsletter & News</div>
    <div class="card" style="margin-bottom:12px">
      <div class="sec-title">Newsletter verfassen</div>
      <div class="field"><label>Betreff</label><input id="nl-sub" value="Newsletter ${new Date().toLocaleString("de-DE",{month:"long",year:"numeric"})}"></div>
      <div class="field"><label>Inhalt</label><textarea id="nl-body" style="min-height:200px">Liebe Mitglieder und Freunde des Porsche Club Nürburgring,\n\n</textarea></div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span style="font-size:12px;color:var(--muted)">📨 ${n} Mitglieder · erscheint im App-Feed</span>
        <button class="btn" onclick="publishNL()">📬 Veröffentlichen</button>
      </div>
    </div>`;
}

function rNewsfeed(el) {
  el.innerHTML=`
    <div class="page-title">📰 News-Feed</div>
    <div class="card">
      <div class="sec-title">Einzelnen Artikel erstellen</div>
      <div class="g2" style="margin-bottom:10px">
        <div class="field"><label>Typ</label><select id="nf-type">
          <option value="news">📰 Neuigkeit</option>
          <option value="tip">💡 Tipp</option>
          <option value="welcome">🎉 Ankündigung</option>
        </select></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:16px">
          <input type="checkbox" id="nf-pin" style="width:16px;height:16px;accent-color:var(--red)">
          <label for="nf-pin" style="font-size:13px;color:var(--white);text-transform:none;letter-spacing:0;cursor:pointer">Als NEU markieren</label>
        </div>
      </div>
      <div class="field"><label>Titel *</label><input id="nf-title" placeholder="z.B. Neue Kooperation…"></div>
      <div class="field"><label>Text</label><textarea id="nf-body" style="min-height:100px"></textarea></div>
      <button class="btn" onclick="publishNews()">📰 Veröffentlichen</button>

// ── Settings ──────────────────────────────────────────────────────────────────
function rSettings(el) {
  el.innerHTML=`
    <div class="page-title">⚙️ Einstellungen</div>
    <div class="card">
      <div class="sec-title">Systemstatus</div>
      ${[["Supabase","✓ Verbunden","var(--green)"],["Mitglieder",DB.members.length+" gesamt","var(--white)"],["Fahrzeuge",DB.vehicles.length+" gesamt","var(--white)"],["App","qar.gallery/pcn/","var(--muted)"],["Admin","qar.gallery/pcn/admin.html","var(--muted)"]].map(([k,v,c])=>`
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #131313;font-size:13px">
          <span style="color:var(--muted)">${k}</span><span style="color:${c}">${v}</span>
        </div>`).join("")}
    </div>
    <div class="card">
      <div class="sec-title">Club-Zugangscode</div>
      <div class="field"><label>Mitglieder-Code</label><input value="PCN2026" readonly style="font-family:monospace;letter-spacing:3px"></div>
      <div style="font-size:11px;color:var(--muted)">Wird bei der App-Registrierung eingegeben.</div>
    </div>
    <div class="card">
      <div class="sec-title">Datenschutz-Hinweis</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7">
        ⚠️ Chat-Nachrichten zwischen Mitgliedern sind hier <b style="color:var(--white)">nicht einsehbar</b> — diese sind vertraulich und nur für die beteiligten Nutzer sichtbar.<br><br>
        Sichtbar für den Admin: Mitgliedsdaten, Fahrzeuge, Events, Beitragsstand und Punkte.
      </div>
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function confirmParticipant(partId, eventId) {
  await api(`participants?id=eq.${partId}`,{method:"PATCH",body:JSON.stringify({status:"confirmed"})});
  toast("✓ Teilnahme bestätigt"); await loadAll();
}
async function cancelParticipant(partId, eventId) {
  if(!confirm("Anmeldung stornieren?")) return;
  await api(`participants?id=eq.${partId}`,{method:"PATCH",body:JSON.stringify({status:"cancelled"})});
  toast("Anmeldung storniert"); await loadAll();
}
async function toggleRole(id, isMember) {
  const newRole = isMember ? "guest" : "member";
  await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({role:newRole})});
  toast(isMember?"→ Als Gast gesetzt":"✓ Als Mitglied freigegeben"); await loadAll();
}
async function togglePaid(id, isPaid) {
  await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:!isPaid})});
  toast(isPaid?"Beitrag als offen markiert":"✓ Beitrag als bezahlt markiert"); await loadAll();
}
async function markPaid(id) { await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:true})}); toast("✓ Bezahlt"); await loadAll(); }
async function markUnpaid(id) { await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:false})}); toast("Zurückgesetzt"); await loadAll(); }
async function upgradeMember(id) { await api(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({role:"member"})}); toast("✓ Als Mitglied freigegeben"); await loadAll(); }
async function delMember(id,name) { if(!confirm(`${name} löschen?`)) return; await api(`users?id=eq.${id}`,{method:"DELETE"}); toast("Gelöscht"); await loadAll(); }
function toggleNewEvent() { document.getElementById("ev-form").classList.toggle("hidden"); }
async function createEvent() {
  const name=document.getElementById("ev-name")?.value, date=document.getElementById("ev-date")?.value;
  if(!name||!date) return toast("Name + Datum erforderlich","err");
  await api("events",{method:"POST",body:JSON.stringify({name,date,location:document.getElementById("ev-loc")?.value,category:document.getElementById("ev-cat")?.value,entry_fee:document.getElementById("ev-price")?.value,description:document.getElementById("ev-desc")?.value,created_at:new Date().toISOString()})});
  toast("Event erstellt ✓"); await loadAll();
}
async function delEvent(id,name) { if(!confirm(`"${name}" löschen?`)) return; await api(`events?id=eq.${id}`,{method:"DELETE"}); toast("Gelöscht"); await loadAll(); }
async function publishNL() {
  const sub=document.getElementById("nl-sub")?.value, body=document.getElementById("nl-body")?.value;
  if(!sub||!body) return toast("Betreff + Inhalt erforderlich","err");
  if(!confirm(`Newsletter veröffentlichen?`)) return;
  await api("news",{method:"POST",body:JSON.stringify({title:sub,body,type:"newsletter",icon:"📬",pinned:true,created_at:new Date().toISOString(),author:"PCN Vorstand"})}).catch(()=>{});
  toast("Newsletter veröffentlicht ✓");
}
async function publishNews() {
  const title=document.getElementById("nf-title")?.value, body=document.getElementById("nf-body")?.value;
  const type=document.getElementById("nf-type")?.value||"news", pinned=document.getElementById("nf-pin")?.checked;
  if(!title) return toast("Titel erforderlich","err");
  await api("news",{method:"POST",body:JSON.stringify({title,body,type,pinned,icon:type==="news"?"📰":type==="tip"?"💡":"🎉",created_at:new Date().toISOString(),author:"PCN Vorstand"})}).catch(()=>{});
  toast("Artikel veröffentlicht ✓");
  document.getElementById("nf-title").value=""; document.getElementById("nf-body").value="";
}
function exportCSV() {
  const a=DB.members.filter(m=>m.role==="member");
  const rows=[["Name","E-Mail","Nr.","Status","Betrag"],...a.map(m=>[m.name||"",m.email||"",m.member_nr||"",m.beitrag_bezahlt?"Bezahlt":"Offen",EUR+" EUR"])];
  const el=document.createElement("a"); el.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(";")).join("\n")); el.download="PCN_Beitraege_2026.csv"; el.click();
  toast("CSV exportiert ✓");
}

// ── Init ──────────────────────────────────────────────────────────────────────
if(sessionStorage.getItem("pcn_adm")==="1") {
  document.getElementById("login-wrap").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  loadAll();
}
</script>
