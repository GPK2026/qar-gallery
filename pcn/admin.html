<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCN Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#D5001C;--dark:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--gold:#C8A96E;--blue:#6b7fff}
    body{background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;font-size:14px}
    a{color:inherit;text-decoration:none}
    /* Header */
    #hdr{background:#fff;border-bottom:3px solid var(--red);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .hdr-l{display:flex;align-items:center;gap:10px}
    #hdr img{height:32px;object-fit:contain}
    .htitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:#111}
    .hbadge{font-size:9px;background:var(--red);color:#fff;padding:2px 6px;border-radius:3px;font-weight:800}
    /* Layout */
    #layout{display:flex;min-height:calc(100vh - 54px)}
    #sidebar{width:190px;background:#080808;border-right:1px solid var(--border);padding:10px 0;flex-shrink:0;overflow-y:auto}
    .nav-sec{font-size:9px;font-weight:800;color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;padding:12px 16px 4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-left:2px solid transparent}
    .nav-item:hover{color:var(--white);background:#111}
    .nav-item.active{color:var(--white);border-left-color:var(--red);background:#111}
    .nbadge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto}
    /* Main */
    #main{flex:1;padding:20px;overflow-y:auto}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;margin-bottom:18px;display:flex;align-items:center;gap:8px}
    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
    .sec-title{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
    /* Stats */
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900}
    .stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
    .stat-sub{font-size:11px;margin-top:4px;color:var(--muted)}
    /* Table */
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:7px 10px;border-bottom:1px solid var(--border)}
    td{padding:9px 10px;border-bottom:1px solid #131313;vertical-align:middle}
    tr:hover td{background:#0d0d0d}
    /* Badges */
    .b{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:800}
    .b-green{background:#16a34a22;color:var(--green);border:1px solid #16a34a33}
    .b-red{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
    .b-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b33}
    .b-gray{background:#22222244;color:var(--muted);border:1px solid var(--border)}
    /* Form */
    input,select,textarea{background:#1a1a1a;border:1px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;outline:none;width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--red)}
    label{font-size:9px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .field{margin-bottom:12px}
    /* Buttons */
    .btn{background:var(--red);border:none;border-radius:7px;padding:9px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
    .btn:hover{opacity:.85}
    .btn-sm{padding:4px 9px;font-size:11px;border-radius:5px}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-green{background:#16a34a}
    .row{display:flex;gap:8px;align-items:center}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    /* Bar */
    .bar{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:5px}
    .bar-fill{height:100%;border-radius:3px}
    /* Login */
    #login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    #login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;width:340px}
    /* Toast */
    #toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--green);color:var(--green);padding:9px 18px;border-radius:7px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap}
    #toast.err{border-color:#ef4444;color:#ef4444}
    .hidden{display:none!important}
  </style>
</head>
<body>

<div id="login-wrap">
  <div id="login-card">
    <div style="background:#fff;border-radius:8px;padding:16px;text-align:center;margin-bottom:20px">
      <img src="https://www.pcn-nuerburgring.de/wp-content/uploads/2020/07/PCN-Logo_2020_internet.jpg" style="height:50px;object-fit:contain" onerror="this.style.display='none'">
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;margin-bottom:4px">Club-Administration</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px">Nur für autorisierte Vorstandsmitglieder</div>
    <div class="field"><label>Admin-Code</label><input type="password" id="code-inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" style="width:100%;padding:12px;margin-top:4px" onclick="doLogin()">Anmelden →</button>
    <div style="font-size:11px;color:#222;text-align:center;margin-top:16px">Powered by <span style="color:var(--gold)">QAR.Gallery</span></div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="hdr">
    <div class="hdr-l">
      <img src="https://www.pcn-nuerburgring.de/wp-content/uploads/2020/07/PCN-Logo_2020_internet.jpg" onerror="this.style.display='none'">
      <div><div class="htitle">CLUBVERWALTUNG</div><span class="hbadge">ADMIN</span></div>
    </div>
    <div class="row">
      <span style="font-size:12px;color:#888">Porsche Club Nürburgring</span>
      <button class="btn btn-sm btn-ghost" onclick="doLogout()">Abmelden</button>
      <button class="btn btn-sm" onclick="loadAll()">↺ Reload</button>
    </div>
  </div>
  <div id="layout">
    <nav id="sidebar">
      <div class="nav-sec">Übersicht</div>
      <div class="nav-item active" onclick="showTab('dashboard')">📊 Dashboard</div>
      <div class="nav-item" onclick="showTab('activity')">⚡ Aktivität</div>
      <div class="nav-sec">Mitglieder</div>
      <div class="nav-item" onclick="showTab('members')">👥 Mitglieder <span class="nbadge" id="badge-guests"></span></div>
      <div class="nav-item" onclick="showTab('payments')">💳 Zahlungen <span class="nbadge" id="badge-payments"></span></div>
      <div class="nav-item" onclick="showTab('vehicles')">🚗 Fahrzeuge</div>
      <div class="nav-sec">Events & Inhalt</div>
      <div class="nav-item" onclick="showTab('events')">🏁 Events</div>
      <div class="nav-item" onclick="showTab('newsletter')">📬 Newsletter</div>
      <div class="nav-item" onclick="showTab('newsfeed')">📰 News-Feed</div>
      <div class="nav-sec">System</div>
      <div class="nav-item" onclick="showTab('settings')">⚙️ Einstellungen</div>
    </nav>
    <main id="main">
      <div id="tab-dashboard"></div>
      <div id="tab-activity" class="hidden"></div>
      <div id="tab-members" class="hidden"></div>
      <div id="tab-payments" class="hidden"></div>
      <div id="tab-vehicles" class="hidden"></div>
      <div id="tab-events" class="hidden"></div>
      <div id="tab-newsletter" class="hidden"></div>
      <div id="tab-newsfeed" class="hidden"></div>
      <div id="tab-settings" class="hidden"></div>
    </main>
  </div>
</div>
<div id="toast"></div>

<script>
const SB_URL = "https://xsyuhfleesstrchcwspg.supabase.co/rest/v1";
const SB_KEY = "sb_publishable_xmmKWwXaQliEBAOIFPM8ig_srQP3zED";
const ADMIN  = "PCN-ADMIN-2026";
const BEITRAG = 95;

let DB = {members:[], events:[], vehicles:[], threads:[]};
let currentTab = "dashboard";

// ── Supabase ──────────────────────────────────────────────────────────────────
async function sb(path, opts={}) {
  const r = await fetch(SB_URL+"/"+path, {
    ...opts,
    headers: {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,
      "Content-Type":"application/json","Prefer":"return=representation",...(opts.headers||{})}
  });
  const d = await r.json();
  return r.ok ? {data:d} : {data:null,error:d};
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function doLogin() {
  const v = document.getElementById("code-inp").value.trim().toUpperCase();
  if(v===ADMIN) { sessionStorage.setItem("pcn_admin","1"); showApp(); }
  else toast("Falscher Code","err");
}
function doLogout() { sessionStorage.removeItem("pcn_admin"); location.reload(); }
function showApp() {
  document.getElementById("login-wrap").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  loadAll();
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  toast("Lädt…");
  const [m,e,v,t] = await Promise.all([
    sb("users?select=*&order=created_at.desc"),
    sb("events?select=*&order=date.asc"),
    sb("vehicles?select=*&order=created_at.desc"),
    sb("threads?select=*&order=created_at.desc&limit=50"),
  ]);
  if(m.data) DB.members = m.data;
  if(e.data) DB.events  = e.data;
  if(v.data) DB.vehicles= v.data;
  if(t.data) DB.threads = t.data;
  updateBadges();
  renderTab(currentTab);
  toast("Daten geladen ✓");
}

function updateBadges() {
  const guests   = DB.members.filter(m=>m.role==="guest").length;
  const unpaid   = DB.members.filter(m=>m.role==="member"&&!m.beitrag_bezahlt).length;
  const bg = document.getElementById("badge-guests");
  const bp = document.getElementById("badge-payments");
  if(bg) bg.textContent = guests||""; if(bg) bg.style.display = guests?"":"none";
  if(bp) bp.textContent = unpaid||""; if(bp) bp.style.display = unpaid?"":"none";
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll(".nav-item").forEach(el=>{
    el.classList.toggle("active", el.getAttribute("onclick")===`showTab('${id}')`);
  });
  document.querySelectorAll("[id^='tab-']").forEach(el=>el.classList.add("hidden"));
  document.getElementById("tab-"+id).classList.remove("hidden");
  currentTab = id;
  renderTab(id);
}

function renderTab(id) {
  const el = document.getElementById("tab-"+id);
  if(!el) return;
  const fn = {
    dashboard:  renderDashboard,
    activity:   renderActivity,
    members:    renderMembers,
    payments:   renderPayments,
    vehicles:   renderVehicles,
    events:     renderEvents,
    newsletter: renderNewsletter,
    newsfeed:   renderNewsfeed,
    settings:   renderSettings,
  }[id];
  if(fn) fn(el);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(d) {
  if(!d) return "—";
  return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"2-digit"});
}
function fmtFull(d) {
  if(!d) return "—";
  return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});
}
function daysLeft(d) { return Math.ceil((new Date(d)-new Date())/86400000); }
function toast(msg,type="ok") {
  const el=document.getElementById("toast");
  el.textContent=msg; el.className=type==="err"?"err":"";
  el.style.display="block"; clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display="none",3000);
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(el) {
  const aktive  = DB.members.filter(m=>m.role==="member");
  const gaeste  = DB.members.filter(m=>m.role==="guest");
  const bezahlt = aktive.filter(m=>m.beitrag_bezahlt);
  const offen   = aktive.filter(m=>!m.beitrag_bezahlt);
  const bezPct  = aktive.length ? Math.round(bezahlt.length/aktive.length*100) : 0;
  const nextEvs = DB.events.filter(e=>new Date(e.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const d30     = new Date(Date.now()-30*86400000);
  const newM    = DB.members.filter(m=>m.created_at&&new Date(m.created_at)>d30);

  el.innerHTML = `
    <div class="page-title">📊 Dashboard</div>
    <div class="stat-grid">
      ${stat(aktive.length,"Aktive Mitglieder",`+${newM.filter(m=>m.role==="member").length} neu (30d)`,"var(--white)")}
      ${stat(gaeste.length,"Gast-Accounts","Warten auf Freigabe","var(--amber)")}
      ${stat(bezPct+"%","Beitrag bezahlt",`${bezahlt.length} / ${aktive.length}`,"var(--green)")}
      ${stat("€"+bezahlt.length*BEITRAG,"Einnahmen 2026","€"+offen.length*BEITRAG+" offen","var(--gold)")}
      ${stat(DB.vehicles.length,"Fahrzeuge",`${(DB.vehicles.length/Math.max(aktive.length,1)).toFixed(1)} pro Mitglied`,"var(--blue)")}
      ${stat(nextEvs.length,"Nächste Events",nextEvs[0]?fmtFull(nextEvs[0].date):"Keine","var(--red)")}
    </div>

    <div class="g2">
      <div>
        <div class="card">
          <div class="sec-title">💳 Beitragsstatus</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="color:var(--muted)">Bezahlt</span>
            <span style="color:var(--green);font-weight:700">${bezahlt.length} × €${BEITRAG} = €${bezahlt.length*BEITRAG}</span>
          </div>
          <div class="bar"><div class="bar-fill" style="width:${bezPct}%;background:var(--green)"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:10px;margin-bottom:4px">
            <span style="color:var(--muted)">Offen</span>
            <span style="color:var(--amber);font-weight:700">${offen.length} × €${BEITRAG} = €${offen.length*BEITRAG}</span>
          </div>
          <div class="bar"><div class="bar-fill" style="width:${100-bezPct}%;background:var(--amber)"></div></div>
          ${offen.length>0?`
            <div style="margin-top:14px;font-size:11px;color:var(--muted);margin-bottom:8px">Ausstehend:</div>
            ${offen.slice(0,4).map(m=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #131313">
                <span style="font-size:12px">${m.name||m.email||"—"}</span>
                <button class="btn btn-sm btn-green" onclick="markPaid('${m.id}')">✓ Bezahlt</button>
              </div>`).join("")}
            ${offen.length>4?`<div style="font-size:11px;color:var(--muted);margin-top:6px">+${offen.length-4} weitere im Zahlungen-Tab</div>`:""}
          `:"<div style='color:var(--green);font-size:13px;margin-top:10px'>✓ Alle Beiträge bezahlt</div>"}
        </div>

        <div class="card">
          <div class="sec-title">🆕 Neue Registrierungen (30 Tage)</div>
          ${newM.length===0
            ? "<div style='color:var(--muted);font-size:13px'>Keine neuen Anmeldungen</div>"
            : newM.slice(0,5).map(m=>`
              <div style="display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid #131313">
                <div style="width:28px;height:28px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">
                  ${(m.name||m.email||"?")[0].toUpperCase()}
                </div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name||"—"}</div>
                  <div style="font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.email||""}</div>
                </div>
                <span class="b ${m.role==='member'?'b-green':'b-amber'}">${m.role==="member"?"Mitglied":"Gast"}</span>
                ${m.role==="guest"?`<button class="btn btn-sm btn-green" onclick="upgradeMember('${m.id}')">→</button>`:""}
              </div>`).join("")
          }
        </div>
      </div>

      <div>
        <div class="card">
          <div class="sec-title">🏁 Nächste Events</div>
          ${nextEvs.length===0
            ? "<div style='color:var(--muted);font-size:13px'>Keine Events geplant</div>"
            : nextEvs.slice(0,6).map(ev=>{
                const dl = daysLeft(ev.date);
                const col = dl<=7?"var(--red)":dl<=30?"var(--amber)":"var(--green)";
                return `
                <div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #131313">
                  <div style="min-width:36px;text-align:center">
                    <div style="font-size:18px;font-weight:900;color:var(--red);font-family:'Barlow Condensed',sans-serif;line-height:1">${new Date(ev.date).getDate()}</div>
                    <div style="font-size:9px;color:var(--muted);text-transform:uppercase">${new Date(ev.date).toLocaleString("de-DE",{month:"short"})}</div>
                  </div>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.name}</div>
                    <div style="font-size:10px;color:var(--muted)">${ev.location||""}</div>
                  </div>
                  <span class="b" style="background:${col}22;color:${col};border:1px solid ${col}44">${dl}d</span>
                </div>`;}).join("")
          }
        </div>

        <div class="card">
          <div class="sec-title">🚗 Zuletzt hinzugefügt</div>
          ${DB.vehicles.slice(0,5).map(v=>`
            <div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid #131313">
              ${v.image?`<div style="width:38px;height:28px;border-radius:3px;overflow:hidden;flex-shrink:0"><img src="${v.image}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`:""}
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.hersteller||""} ${v.modell||""}</div>
                <div style="font-size:10px;color:var(--muted)">${v.baujahr||""} · ${v.farbe||""}</div>
              </div>
              <div style="font-size:10px;color:var(--muted);font-family:monospace">${(v.qar_id||"").slice(4)}</div>
            </div>`).join("")}
        </div>
      </div>
    </div>`;
}

function stat(val,lbl,sub,color) {
  return `<div class="stat">
    <div class="stat-val" style="color:${color}">${val}</div>
    <div class="stat-lbl">${lbl}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

// ── Activity ──────────────────────────────────────────────────────────────────
function renderActivity(el) {
  const acts = [
    ...DB.members.map(m=>({ts:m.created_at,text:(m.name||m.email||"Unbekannt")+" registriert",col:"var(--blue)",badge:m.role==="member"?"Mitglied":"Gast",badgeCls:m.role==="member"?"b-green":"b-amber"})),
    ...DB.vehicles.map(v=>({ts:v.created_at,text:(v.hersteller||"")+" "+(v.modell||"")+" hinzugefügt",col:"var(--gold)"})),
    ...DB.threads.map(t=>({ts:t.created_at,text:"Neuer Chat: "+(t.vehicle_name||t.vehicleName||"Fahrzeug"),col:"var(--green)"})),
  ].filter(a=>a.ts).sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,40);

  el.innerHTML = `
    <div class="page-title">⚡ Aktivitätsfeed</div>
    <div class="card">
      ${acts.map(a=>`
        <div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #131313;align-items:flex-start">
          <div style="width:8px;height:8px;border-radius:50%;background:${a.col};flex-shrink:0;margin-top:4px"></div>
          <div style="flex:1">
            <span style="font-size:13px">${a.text}</span>
            ${a.badge?`<span class="b ${a.badgeCls}" style="margin-left:6px">${a.badge}</span>`:""}
          </div>
          <div style="font-size:11px;color:var(--muted);flex-shrink:0">${fmt(a.ts)}</div>
        </div>`).join("")}
    </div>`;
}

// ── Members ───────────────────────────────────────────────────────────────────
function renderMembers(el) {
  el.innerHTML = `
    <div class="page-title">👥 Mitgliederverwaltung <span style="font-size:13px;font-weight:400;color:var(--muted)">(${DB.members.length} gesamt)</span></div>
    <div class="card">
      <div class="row" style="margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <input id="m-search" placeholder="🔍 Name, E-Mail oder Nr." oninput="filterMembers()" style="flex:1;min-width:160px">
        <select id="m-filter" onchange="filterMembers()" style="width:auto">
          <option value="all">Alle (${DB.members.length})</option>
          <option value="member">Mitglieder (${DB.members.filter(m=>m.role==="member").length})</option>
          <option value="guest">Gäste (${DB.members.filter(m=>m.role==="guest").length})</option>
        </select>
      </div>
      <div style="overflow-x:auto">
        <table id="members-table">
          <thead><tr>
            <th>Mitglied</th><th>Nr.</th><th>Status</th><th>Beitrag</th><th>Seit</th><th>Aktionen</th>
          </tr></thead>
          <tbody id="members-tbody"></tbody>
        </table>
      </div>
    </div>`;
  filterMembers();
}

function filterMembers() {
  const q     = (document.getElementById("m-search")?.value||"").toLowerCase();
  const role  = document.getElementById("m-filter")?.value||"all";
  const tbody = document.getElementById("members-tbody");
  if(!tbody) return;
  const filtered = DB.members.filter(m=>{
    if(role==="member"&&m.role!=="member") return false;
    if(role==="guest"&&m.role!=="guest") return false;
    if(q&&!`${m.name||""} ${m.email||""} ${m.member_nr||""}`.toLowerCase().includes(q)) return false;
    return true;
  });
  tbody.innerHTML = filtered.map(m=>`
    <tr>
      <td>
        <div style="font-weight:600">${m.name||"—"}</div>
        <div style="font-size:11px;color:var(--muted)">${m.email||""}</div>
      </td>
      <td style="font-size:11px;color:var(--muted);font-family:monospace">${m.member_nr||"—"}</td>
      <td><span class="b ${m.role==="member"?"b-green":m.role==="guest"?"b-amber":"b-gray"}">${m.role==="member"?"Mitglied":m.role==="guest"?"Gast":"—"}</span></td>
      <td><span class="b ${m.beitrag_bezahlt?"b-green":"b-red"}">${m.beitrag_bezahlt?"✓ Bezahlt":"✗ Offen"}</span></td>
      <td style="font-size:11px;color:var(--muted)">${fmt(m.created_at)}</td>
      <td>
        <div class="row">
          ${m.role==="guest"?`<button class="btn btn-sm btn-green" onclick="upgradeMember('${m.id}')">→ Mitglied</button>`:""}
          <button class="btn btn-sm" style="background:#ef444422;color:#ef4444;border:1px solid #ef444433" onclick="deleteMember('${m.id}','${(m.name||m.email||"").replace(/'/g,"\\'")}')">✕</button>
        </div>
      </td>
    </tr>`).join("")||`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Keine Ergebnisse</td></tr>`;
}

// ── Payments ──────────────────────────────────────────────────────────────────
function renderPayments(el) {
  const aktive  = DB.members.filter(m=>m.role==="member");
  const bezahlt = aktive.filter(m=>m.beitrag_bezahlt);
  const offen   = aktive.filter(m=>!m.beitrag_bezahlt);
  el.innerHTML = `
    <div class="page-title">💳 Zahlungen</div>
    <div class="stat-grid">
      ${stat(bezahlt.length,"Bezahlt","€"+bezahlt.length*BEITRAG+" eingegangen","var(--green)")}
      ${stat(offen.length,"Offen","€"+offen.length*BEITRAG+" ausstehend","#ef4444")}
      ${stat(aktive.length,"Gesamt","€"+aktive.length*BEITRAG+" Soll","var(--white)")}
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="sec-title" style="margin:0">Offene Beiträge 2026</div>
        <button class="btn btn-sm btn-ghost" onclick="exportCSV()">📥 CSV Export</button>
      </div>
      ${offen.length===0
        ? "<div style='color:var(--green);font-size:13px'>✓ Alle Beiträge bezahlt</div>"
        : `<table><thead><tr><th>Mitglied</th><th>Nr.</th><th>Betrag</th><th>Aktion</th></tr></thead><tbody>
          ${offen.map(m=>`<tr>
            <td><div style="font-weight:600">${m.name||"—"}</div><div style="font-size:11px;color:var(--muted)">${m.email||""}</div></td>
            <td style="font-size:11px;color:var(--muted)">${m.member_nr||"—"}</td>
            <td style="font-weight:700;color:#ef4444">€ ${BEITRAG}</td>
            <td><button class="btn btn-sm btn-green" onclick="markPaid('${m.id}')">✓ Bezahlt</button></td>
          </tr>`).join("")}
          </tbody></table>`}
    </div>
    <div class="card" style="margin-top:14px">
      <div class="sec-title">Bezahlte Beiträge</div>
      <table><thead><tr><th>Mitglied</th><th>Nr.</th><th>Status</th><th></th></tr></thead><tbody>
        ${bezahlt.map(m=>`<tr>
          <td><div style="font-weight:600">${m.name||"—"}</div><div style="font-size:11px;color:var(--muted)">${m.email||""}</div></td>
          <td style="font-size:11px;color:var(--muted)">${m.member_nr||"—"}</td>
          <td><span class="b b-green">✓ € ${BEITRAG}</span></td>
          <td><button class="btn btn-sm btn-ghost" onclick="markUnpaid('${m.id}')">Zurücksetzen</button></td>
        </tr>`).join("")}
      </tbody></table>
    </div>`;
}

// ── Vehicles ──────────────────────────────────────────────────────────────────
function renderVehicles(el) {
  el.innerHTML = `
    <div class="page-title">🚗 Fahrzeuge <span style="font-size:13px;font-weight:400;color:var(--muted)">(${DB.vehicles.length})</span></div>
    <div class="card">
      <input id="v-search" placeholder="🔍 Modell, Kennzeichen, QAR-ID" oninput="filterVehicles()" style="margin-bottom:14px">
      <div style="overflow-x:auto">
        <table id="vehicles-table">
          <thead><tr><th>Fahrzeug</th><th>Baujahr</th><th>Farbe</th><th>Kennzeichen</th><th>QAR-ID</th><th>km</th></tr></thead>
          <tbody id="vehicles-tbody"></tbody>
        </table>
      </div>
    </div>`;
  filterVehicles();
}

function filterVehicles() {
  const q = (document.getElementById("v-search")?.value||"").toLowerCase();
  const tbody = document.getElementById("vehicles-tbody");
  if(!tbody) return;
  const filtered = DB.vehicles.filter(v=>!q||`${v.hersteller} ${v.modell} ${v.kennzeichen||""} ${v.qar_id||""}`.toLowerCase().includes(q));
  tbody.innerHTML = filtered.map(v=>`
    <tr>
      <td>
        <div style="display:flex;gap:8px;align-items:center">
          ${v.image?`<div style="width:36px;height:26px;border-radius:3px;overflow:hidden;flex-shrink:0"><img src="${v.image}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`:""}
          <div>
            <div style="font-weight:600">${v.hersteller||""} ${v.modell||""}</div>
          </div>
        </div>
      </td>
      <td style="font-size:12px;color:var(--muted)">${v.baujahr||"—"}</td>
      <td style="font-size:12px;color:var(--muted)">${v.farbe||"—"}</td>
      <td style="font-size:12px;color:var(--muted)">${v.kennzeichen||"—"}</td>
      <td style="font-size:10px;color:var(--muted);font-family:monospace">${v.qar_id||"—"}</td>
      <td style="font-size:12px;color:var(--muted)">${v.kilometerstand?parseInt(v.kilometerstand).toLocaleString("de-DE")+" km":"—"}</td>
    </tr>`).join("")||`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Keine Ergebnisse</td></tr>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function renderEvents(el) {
  const sorted = [...DB.events].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const now = new Date();
  el.innerHTML = `
    <div class="page-title">🏁 Events</div>
    <button class="btn" onclick="toggleNewEvent()" style="margin-bottom:14px">+ Neues Event</button>
    <div id="new-event-form" class="card hidden" style="margin-bottom:14px">
      <div class="sec-title">Neues Event anlegen</div>
      <div class="g2">
        <div class="field"><label>Name *</label><input id="ev-name" placeholder="PCN TrackDay..."></div>
        <div class="field"><label>Datum *</label><input id="ev-date" type="date"></div>
        <div class="field"><label>Ort</label><input id="ev-loc" placeholder="Nürburgring GP-Strecke"></div>
        <div class="field"><label>Kategorie</label><select id="ev-cat">
          <option>Clubabend</option><option>Trackday</option><option>Ausfahrt</option>
          <option>Oldtimer</option><option>Rennsport</option><option>Saisonfahrt</option>
        </select></div>
        <div class="field"><label>Preis</label><input id="ev-price" placeholder="€ 95 / Kostenlos"></div>
      </div>
      <div class="field"><label>Beschreibung</label><textarea id="ev-desc" style="min-height:70px"></textarea></div>
      <div class="row"><button class="btn" onclick="createEvent()">✓ Erstellen</button><button class="btn btn-ghost" onclick="toggleNewEvent()">Abbrechen</button></div>
    </div>
    <div class="card">
      <table><thead><tr><th>Event</th><th>Datum</th><th>Ort</th><th>Kategorie</th><th>Status</th><th></th></tr></thead>
      <tbody>${sorted.map(ev=>{
        const past = new Date(ev.date)<now;
        const dl   = daysLeft(ev.date);
        const cls  = past?"b-gray":dl<=7?"b-red":"b-green";
        const lbl  = past?"Abgeschlossen":dl<=7?"Bald":"Geplant";
        return `<tr>
          <td style="font-weight:600">${ev.name}</td>
          <td style="font-size:12px">${fmtFull(ev.date)}</td>
          <td style="font-size:12px;color:var(--muted)">${ev.location||"—"}</td>
          <td><span class="b b-gray">${ev.category||"—"}</span></td>
          <td><span class="b ${cls}">${lbl}</span></td>
          <td><button class="btn btn-sm" style="background:#ef444422;color:#ef4444;border:1px solid #ef444433" onclick="deleteEvent('${ev.id}','${(ev.name||"").replace(/'/g,"\\'")}')">✕</button></td>
        </tr>`;}).join("")||`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Keine Events</td></tr>`}
      </tbody></table>
    </div>`;
}

// ── Newsletter ────────────────────────────────────────────────────────────────
function renderNewsletter(el) {
  const aktive = DB.members.filter(m=>m.role==="member").length;
  el.innerHTML = `
    <div class="page-title">📬 Newsletter</div>
    <div class="card">
      <div class="field"><label>Betreff</label><input id="nl-subject" value="Newsletter ${new Date().toLocaleString("de-DE",{month:"long",year:"numeric"})}"></div>
      <div class="field"><label>Inhalt</label><textarea id="nl-body" style="min-height:280px">Liebe Mitglieder und Freunde des Porsche Club Nürburgring,\n\n</textarea></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-size:12px;color:var(--muted)">📨 Erscheint im App-Feed für alle ${aktive} Mitglieder</span>
        <button class="btn" onclick="publishNewsletter()">📬 Veröffentlichen</button>
      </div>
    </div>`;
}

// ── Newsfeed ──────────────────────────────────────────────────────────────────
function renderNewsfeed(el) {
  el.innerHTML = `
    <div class="page-title">📰 News-Feed</div>
    <div class="card">
      <div class="g2" style="margin-bottom:12px">
        <div class="field"><label>Typ</label><select id="nf-type">
          <option value="news">📰 Neuigkeit</option>
          <option value="tip">💡 Tipp</option>
          <option value="welcome">🎉 Ankündigung</option>
        </select></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:18px">
          <input type="checkbox" id="nf-pinned" style="width:15px;height:15px;accent-color:var(--red)">
          <label for="nf-pinned" style="font-size:13px;color:var(--white);text-transform:none;letter-spacing:0;cursor:pointer">Als NEU markieren</label>

      </div>
      <div class="field"><label>Titel *</label><input id="nf-title" placeholder="z.B. Neue Kooperation mit Porsche Zentrum Koblenz"></div>
      <div class="field"><label>Text</label><textarea id="nf-body" style="min-height:120px" placeholder="Inhalt des Artikels..."></textarea></div>
      <button class="btn" onclick="publishNews()">📰 Veröffentlichen</button>
    </div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function renderSettings(el) {
  el.innerHTML = `
    <div class="page-title">⚙️ Einstellungen</div>
    <div class="g2">
      <div class="card">
        <div class="sec-title">Club-Zugangscode</div>
        <div class="field"><label>Beitritts-Code</label><input value="PCN2026" readonly style="font-family:monospace;letter-spacing:3px"></div>
        <div style="font-size:11px;color:var(--muted)">Wird bei der App-Registrierung benötigt.</div>
      </div>
      <div class="card">
        <div class="sec-title">Jahresbeitrag 2026</div>
        <div class="field"><label>Betrag (EUR)</label><input type="number" value="${BEITRAG}" id="beitrag-inp"></div>
        <button class="btn" onclick="toast('Gespeichert ✓')">Speichern</button>
      </div>
      <div class="card">
        <div class="sec-title">Systemstatus</div>
        <div style="display:flex;flex-direction:column;gap:8px;font-size:12px">
          <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Supabase</span><span style="color:var(--green)">✓ Verbunden</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">App</span><span style="color:var(--muted)">qar.gallery/pcn/</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Admin</span><span style="color:var(--muted)">qar.gallery/pcn/admin.html</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Mitglieder</span><span style="color:var(--white)">${DB.members.length}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Fahrzeuge</span><span style="color:var(--white)">${DB.vehicles.length}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="sec-title">Admin-Passcode</div>
        <div class="field"><label>Aktueller Code</label><input type="password" value="PCN-ADMIN-2026" readonly></div>
        <div style="font-size:11px;color:var(--muted)">Änderung via Entwickler.</div>
      </div>

}

// ── Actions ───────────────────────────────────────────────────────────────────
async function markPaid(id) {
  await sb(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:true})});
  toast("✓ Bezahlt markiert"); await loadAll();
}
async function markUnpaid(id) {
  await sb(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:false})});
  toast("Zurückgesetzt"); await loadAll();
}
async function upgradeMember(id) {
  await sb(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({role:"member"})});
  toast("✓ Als Mitglied freigegeben"); await loadAll();
}
async function deleteMember(id,name) {
  if(!confirm(`${name} wirklich löschen?`)) return;
  await sb(`users?id=eq.${id}`,{method:"DELETE"});
  toast("Mitglied gelöscht"); await loadAll();
}
function toggleNewEvent() {
  const f=document.getElementById("new-event-form");
  f.classList.toggle("hidden");
}
async function createEvent() {
  const name = document.getElementById("ev-name")?.value;
  const date = document.getElementById("ev-date")?.value;
  if(!name||!date) return toast("Name und Datum erforderlich","err");
  await sb("events",{method:"POST",body:JSON.stringify({
    name, date,
    location: document.getElementById("ev-loc")?.value,
    category: document.getElementById("ev-cat")?.value,
    price:    document.getElementById("ev-price")?.value,
    desc:     document.getElementById("ev-desc")?.value,
    created_at: new Date().toISOString()
  })});
  toast("Event erstellt ✓"); await loadAll();
}
async function deleteEvent(id,name) {
  if(!confirm(`"${name}" löschen?`)) return;
  await sb(`events?id=eq.${id}`,{method:"DELETE"});
  toast("Event gelöscht"); await loadAll();
}
async function publishNewsletter() {
  const subject = document.getElementById("nl-subject")?.value;
  const body    = document.getElementById("nl-body")?.value;
  if(!subject||!body) return toast("Betreff und Inhalt erforderlich","err");
  const aktive = DB.members.filter(m=>m.role==="member").length;
  if(!confirm(`Newsletter an ${aktive} Mitglieder veröffentlichen?`)) return;
  await sb("news",{method:"POST",body:JSON.stringify({
    title:subject, body, type:"newsletter", icon:"📬", pinned:true,
    created_at:new Date().toISOString(), author:"PCN Vorstand"
  })}).catch(()=>{});
  toast("Newsletter veröffentlicht ✓ · erscheint im App-Feed");
}
async function publishNews() {
  const title  = document.getElementById("nf-title")?.value;
  const body   = document.getElementById("nf-body")?.value;
  const type   = document.getElementById("nf-type")?.value||"news";
  const pinned = document.getElementById("nf-pinned")?.checked||false;
  if(!title) return toast("Titel erforderlich","err");
  await sb("news",{method:"POST",body:JSON.stringify({
    title, body, type, pinned,
    icon: type==="news"?"📰":type==="tip"?"💡":"🎉",
    created_at:new Date().toISOString(), author:"PCN Vorstand"
  })}).catch(()=>{});
  toast("Artikel veröffentlicht ✓");
  document.getElementById("nf-title").value="";
  document.getElementById("nf-body").value="";
}
function exportCSV() {
  const aktive = DB.members.filter(m=>m.role==="member");
  const rows   = [["Name","E-Mail","Nr.","Status","Betrag"],
    ...aktive.map(m=>[m.name||"",m.email||"",m.member_nr||"",m.beitrag_bezahlt?"Bezahlt":"Offen",BEITRAG+" EUR"])];
  const csv = rows.map(r=>r.join(";")).join("\n");
  const a   = document.createElement("a");
  a.href    = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download= "PCN_Beitraege_2026.csv"; a.click();
  toast("CSV exportiert ✓");
}

// ── Init ──────────────────────────────────────────────────────────────────────
if(sessionStorage.getItem("pcn_admin")==="1") showApp();
</script>
