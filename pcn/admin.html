<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PCN Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#D5001C;--dark:#080808;--card:#111;--border:#1e1e1e;--muted:#555;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--gold:#C8A96E;--blue:#6b7fff}
    body{background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;font-size:14px}
    #hdr{background:#fff;border-bottom:3px solid var(--red);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
    .hdr-lb{background:var(--red);padding:3px 8px;border-radius:4px;line-height:1.1}
    .hdr-lb div:first-child{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;color:rgba(255,255,255,.7);letter-spacing:1px}
    .hdr-lb div:last-child{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff}
    .hdr-badge{font-size:8px;background:var(--red);color:#fff;padding:1px 5px;border-radius:2px;font-weight:800}
    #tabbar{display:flex;background:#0a0a0a;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
    .tbt{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 1px;cursor:pointer;font-size:8px;font-weight:700;color:var(--muted);border:none;background:none;gap:2px;position:relative;font-family:'Barlow',sans-serif}
    .tbt span:last-child{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tbt span:first-child{font-size:17px}
    .tbt.active{color:var(--red)}
    .tbt-badge{position:absolute;top:3px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;min-width:14px;text-align:center}
    #sidebar{display:none}
    #layout{display:block}
    #main{padding:14px;padding-bottom:80px}
    @media(min-width:768px){
      #tabbar{display:none}
      #layout{display:flex;min-height:calc(100vh - 52px)}
      #sidebar{display:block;width:185px;background:#0a0a0a;border-right:1px solid var(--border);padding:10px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
      #main{padding:20px;padding-bottom:20px;flex:1}
      .nav-sec{font-size:9px;font-weight:800;color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;padding:12px 16px 4px}
      .nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-left:2px solid transparent}
      .nav-item:hover{color:var(--white);background:#111}
      .nav-item.active{color:var(--white);border-left-color:var(--red);background:#111}
      .nbadge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
    .sec-title{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;margin-bottom:16px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    @media(min-width:600px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
    .stat:hover{border-color:#333}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1}
    .stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .stat-sub{font-size:10px;margin-top:3px;color:var(--muted)}
    .stat-arrow{font-size:9px;color:var(--red);margin-top:3px;font-weight:700}
    input,select,textarea{background:#1a1a1a;border:1px solid var(--border);border-radius:7px;padding:10px 11px;color:var(--white);font-size:14px;font-family:'Barlow',sans-serif;outline:none;width:100%;-webkit-appearance:none}
    input:focus,select:focus,textarea:focus{border-color:var(--red)}
    .lbl{font-size:9px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .field{margin-bottom:12px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.g2{grid-template-columns:1fr}}
    .btn{background:var(--red);border:none;border-radius:7px;padding:10px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
    .btn:active{opacity:.8}
    .btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-green{background:#16a34a}
    .btn-amber{background:#d97706}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .b{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800;white-space:nowrap}
    .b-green{background:#16a34a22;color:var(--green);border:1px solid #16a34a33}
    .b-red{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
    .b-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b33}
    .b-gray{background:#22222244;color:var(--muted);border:1px solid var(--border)}
    .b-gold{background:#C8A96E22;color:var(--gold);border:1px solid #C8A96E44}
    .bar{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:5px}
    .bar-fill{height:100%;border-radius:3px}
    .mrow{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
    .chart-bar-row{display:flex;gap:4px;align-items:flex-end;height:100px}
    .chart-bar{flex:1;border-radius:4px 4px 0 0;min-width:16px;position:relative;cursor:default}
    .chart-bar:hover .chart-tip{display:block}
    .chart-tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:9px;padding:3px 6px;border-radius:4px;white-space:nowrap;margin-bottom:3px;z-index:10}
    .chart-labels{display:flex;gap:4px}
    .chart-label{flex:1;text-align:center;font-size:8px;color:var(--muted);margin-top:3px}
    #login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    #login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:340px}
    #toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;max-width:90vw}
    #toast.err{border-color:#ef4444;color:#ef4444}
    @media(min-width:768px){#toast{bottom:24px}}
    .hidden{display:none!important}
    .tgl-wrap{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .tgl{position:relative;width:44px;height:24px;flex-shrink:0}
    .tgl input{opacity:0;width:0;height:0;position:absolute}
    .tgl-slider{position:absolute;inset:0;background:#333;border-radius:12px;transition:.2s}
    .tgl-slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
    .tgl input:checked+.tgl-slider{background:var(--green)}
    .tgl input:checked+.tgl-slider:before{transform:translateX(20px)}
    .tier{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800}
    .t-bronze{background:#cd7f3222;color:#cd7f32;border:1px solid #cd7f3244}
    .t-silber{background:#aaa2;color:#aaa;border:1px solid #aaa4}
    .t-gold{background:#C8A96E22;color:var(--gold);border:1px solid #C8A96E44}
    .t-platin{background:#6b7fff22;color:var(--blue);border:1px solid #6b7fff44}
    .t-legend{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  </style>
</head>

async function api(path,opts={}){
  try{
    const isPatch = opts.method==="PATCH" || opts.method==="DELETE";
    const headers = {
      "apikey":KEY,
      "Authorization":"Bearer "+KEY,
      "Content-Type":"application/json",
      ...(isPatch ? {} : {"Prefer":"return=representation"}),
      ...(opts.headers||{})
    };
    const r=await fetch(SB+"/"+path,{...opts,headers});
    if(isPatch||opts.method==="DELETE"){
      // PATCH/DELETE: 200/204 = success, anything else = error
      if(r.ok) return {data:null};
      const d=await r.json().catch(()=>({}));
      return {data:null,error:d};
    }
    const d=await r.json().catch(()=>({}));
    return r.ok?{data:d}:{data:null,error:d};
  }catch(e){return{data:null,error:e.message};}
}

function calcPts(id){
  const veh=DB.vehicles.filter(x=>x.user_id===id);
  const conf=DB.participants.filter(x=>x.user_id===id&&x.status==="confirmed").length;
  const mem=DB.members.find(m=>m.id===id);
  let p=0;
  p+=veh.length*POINTS.vehicle_added;
  p+=conf*POINTS.event_confirmed;
  if(mem?.beitrag_bezahlt) p+=POINTS.beitrag_paid;
  if(mem?.created_at){
    const y=Math.floor((Date.now()-new Date(mem.created_at))/(365.25*864e5));
    p+=Math.max(0,y)*POINTS.member_year;
  }
  return p;
}

// ═══════════════════════════════════════════════════════════════════
// DRINGLICHKEITEN — sammelt automatisch alles was Aufmerksamkeit braucht
// ═══════════════════════════════════════════════════════════════════
function collectUrgencies({aktive,gaeste,offen,pending,next}){
  const u=[];
  const today=new Date(); today.setHours(0,0,0,0);
  const RED="#ef4444", AMBER="#f59e0b", BLUE="#5b8fff", GOLD="#C8A96E", GREEN="#22c55e";

  // 1. Ungelesene Nachrichten von Mitgliedern (via separatem Load)
  if(DB.unreadMsgs&&DB.unreadMsgs.length){
    const senders=[...new Set(DB.unreadMsgs.map(m=>{
      const mem=DB.members.find(x=>x.id===m.from_id); return mem?.name||"Unbekannt";
    }))];
    u.push({icon:"💬",color:BLUE,title:`${DB.unreadMsgs.length} ungelesene Nachricht${DB.unreadMsgs.length!==1?"en":""}`,
      detail:`Von: ${senders.slice(0,3).join(", ")}${senders.length>3?` +${senders.length-3} weitere`:""}`,
      action:`showTab('messages')`, actionLabel:"Öffnen"});
  }

  // 2. Gäste warten auf Freigabe
  if(gaeste.length){
    u.push({icon:"👤",color:AMBER,title:`${gaeste.length} ${gaeste.length!==1?"Gäste warten":"Gast wartet"} auf Freigabe`,
      detail:gaeste.slice(0,3).map(g=>g.name).join(", ")+(gaeste.length>3?` +${gaeste.length-3} weitere`:""),
      action:`showMembersFiltered('guest')`, actionLabel:"Prüfen"});
  }

  // 3. Offene Event-Anmeldungen
  if(pending.length){
    u.push({icon:"🏁",color:AMBER,title:`${pending.length} Event-Anmeldung${pending.length!==1?"en":""} offen`,
      detail:"Warten auf Bestätigung durch den Vorstand",
      action:`showTab('events')`, actionLabel:"Bestätigen"});
  }

  // 4. Überfällige Beiträge (Stichtag: 31.03.)
  const deadline=new Date(today.getFullYear(),2,31);
  if(offen.length && today>deadline){
    const daysOver=Math.floor((today-deadline)/864e5);
    u.push({icon:"💸",color:RED,title:`${offen.length} Beitrag${offen.length!==1?"szahlungen":"szahlung"} überfällig`,
      detail:`Stichtag war 31.03. · ${daysOver} Tage überfällig · €${offen.length*EUR} ausstehend`,
      action:`showTab('payments')`, actionLabel:"Ansehen"});
  } else if(offen.length){
    u.push({icon:"💳",color:AMBER,title:`${offen.length} Beitrag${offen.length!==1?"szahlungen":"szahlung"} offen`,
      detail:`€${offen.length*EUR} ausstehend · Stichtag 31.03.${today.getFullYear()}`,
      action:`showTab('payments')`, actionLabel:"Ansehen"});
  }

  // 5. Geburtstage (heute + nächste 7 Tage) — benötigt Spalte "geburtstag"
  const bdays=DB.members.filter(m=>m.geburtstag).map(m=>{
    const bd=new Date(m.geburtstag);
    if(isNaN(bd)) return null;
    const nx=new Date(today.getFullYear(),bd.getMonth(),bd.getDate());
    if(nx<today) nx.setFullYear(nx.getFullYear()+1);
    const days=Math.round((nx-today)/864e5);
    const age=nx.getFullYear()-bd.getFullYear();
    return {m,days,age};
  }).filter(x=>x&&x.days<=7).sort((a,b)=>a.days-b.days);

  bdays.forEach(({m,days,age})=>{
    const when=days===0?"heute":days===1?"morgen":`in ${days} Tagen`;
    const round=age%10===0||age===18||age===25;
    u.push({icon:"🎂",color:round?GOLD:GREEN,
      title:`${m.name} hat ${when} Geburtstag${round?` — ${age}. (rund!)`:""}`,
      detail:`Wird ${age} Jahre alt${days===0?" · heute gratulieren!":""}`,
      action:`openBirthdayMsg('${m.id}','${(m.name||"").replace(/'/g,"\\'")}')`, actionLabel:"Gratulieren"});
  });

  // 6. Event steht bevor mit unbestätigten Anmeldungen
  next.slice(0,3).forEach(ev=>{
    const d=Math.round((new Date(ev.date)-today)/864e5);
    if(d<0||d>3) return;
    const evPending=pending.filter(p=>p.event_id===ev.id);
    if(evPending.length){
      u.push({icon:"⚠️",color:RED,title:`"${ev.name}" ${d===0?"heute":d===1?"morgen":"in "+d+" Tagen"} — ${evPending.length} unbestätigt`,
        detail:"Anmeldungen sollten vor dem Event bestätigt sein",
        action:`showTab('events')`, actionLabel:"Jetzt"});
    }
  });

  // 7. Mitglieder ohne Fahrzeug
  const noVehicle=aktive.filter(m=>!DB.vehicles.some(v=>v.user_id===m.id));
  if(noVehicle.length>=3){
    u.push({icon:"🚗",color:BLUE,title:`${noVehicle.length} Mitglieder ohne Fahrzeug`,
      detail:"Onboarding unvollständig — Reminder senden",
      action:`showMembersFiltered('novehicle')`, actionLabel:"Ansehen"});
  }

  // 8. Unvollständige Fahrzeugakten
  const incompleteMembers=aktive.filter(m=>
    DB.vehicles.some(v=>v.user_id===m.id&&(!v.image||!v.kennzeichen||!v.baujahr||!v.besonderheiten))
  );
  if(incompleteMembers.length>=2){
    u.push({icon:"📋",color:GOLD,title:`${incompleteMembers.length} unvollständige Fahrzeugakten`,
      detail:"Fehlende Fotos, Kennzeichen oder Geschichte — mindert QR-Wirkung",
      action:`showMembersFiltered('incomplete')`, actionLabel:"Prüfen"});
  }

  return u;
}

// ── Handlungsbedarf eines Mitglieds ermitteln (zentrale Logik) ──
function memberIssueKeys(m){
  const isMember=m.role==="member", isPaid=!!m.beitrag_bezahlt;
  const veh=DB.vehicles.filter(v=>v.user_id===m.id);
  const keys=[];
  if(!isMember) keys.push("guest");
  if(isMember&&veh.length===0) keys.push("novehicle");
  if(isMember&&!isPaid) keys.push("unpaid");
  if(veh.some(v=>!v.image||!v.kennzeichen||!v.baujahr||!v.besonderheiten)) keys.push("incomplete");
  if(!m.geburtstag&&isMember) keys.push("nobday");
  return keys;
}

function filterMembers(){
  const q=(document.getElementById("m-q")?.value||"").toLowerCase();
  const f=document.getElementById("m-f")?.value||"all";
  const list=document.getElementById("members-list");if(!list)return;
  const filtered=DB.members.filter(m=>{
    const keys=memberIssueKeys(m);
    if(f==="member"&&m.role!=="member")return false;
    if(f==="guest"&&m.role!=="guest")return false;
    if(f==="issues"&&!keys.length)return false;
    if(f==="unpaid"&&!keys.includes("unpaid"))return false;
    if(f==="novehicle"&&!keys.includes("novehicle"))return false;
    if(f==="incomplete"&&!keys.includes("incomplete"))return false;
    return !q||`${m.name||""} ${m.email||""} ${m.member_nr||""}`.toLowerCase().includes(q);

          ${hasIssues&&!open?`<div style="font-size:10px;color:${critical?"#ef4444":"var(--gold)"};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${issues.slice(0,2).map(i=>i.icon+" "+i.label).join(" · ")}${issues.length>2?` +${issues.length-2}`:""}

let msgModalState = { id:null, name:"", icon:"📣", templates:[] };

// Vorlagen je Handlungsbedarf
// text = eigenständige Nachricht · body = Baustein für kombinierte Nachricht

      body:`Dein Zugang wird gerade geprüft — wir schalten dich in Kürze frei.` },
    unpaid: { icon:"💳", label:"Beitrag erinnern",
      text:`Hallo ${first}, dein Mitgliedsbeitrag ${year} ist noch offen. Bitte überweise ihn bei Gelegenheit — bei Fragen einfach melden. Danke!`,
      body:`Dein Mitgliedsbeitrag ${year} ist noch offen. Bitte überweise ihn bei Gelegenheit.` },
    novehicle: { icon:"🚗", label:"Fahrzeug anlegen",
      text:`Hallo ${first}, du hast noch kein Fahrzeug in deiner Akte angelegt. Damit schaltest du QR-Code, Logbuch und Events frei — und bekommst 500 Punkte. Schau mal rein!`,
      body:`Du hast noch kein Fahrzeug angelegt. Damit schaltest du QR-Code, Logbuch und Events frei — und bekommst 500 Punkte.` },
    incomplete: { icon:"📋", label:"Akte vervollständigen",

      body:`Deine Fahrzeugakte ist fast fertig — es fehlen noch ein paar Angaben. Eine vollständige Akte bringt 750 Bonuspunkte.` },
    nobday: { icon:"🎂", label:"Geburtstag erfragen",
      text:`Hallo ${first}, magst du deinen Geburtstag im Profil hinterlegen? Dann können wir dir gratulieren — und es gibt 200 Punkte geschenkt. Nur für den Vorstand sichtbar.`,
      body:`Magst du deinen Geburtstag im Profil hinterlegen? Dann können wir gratulieren — und es gibt 200 Punkte. Nur für den Vorstand sichtbar.` },
    bday: { icon:"🎉", label:"Gratulieren",
      text:`Alles Gute zum Geburtstag, ${first}! 🎉 Der ganze Porsche Club Nürburgring wünscht dir ein großartiges neues Lebensjahr — und immer freie Fahrt auf der Nordschleife.`,
      body:`Alles Gute zum Geburtstag! Der ganze PCN wünscht dir ein großartiges neues Lebensjahr.` },

// Öffnet das Modal — mit oder ohne Vorlagen
function openMsgModal(id, name, presetKeys){
  const year = new Date().getFullYear();
  const all = reminderTemplates(name, year);
  const order = ["guest","unpaid","novehicle","incomplete","nobday","bday"];
  const keys = (presetKeys||"").split(",").filter(k=>k && all[k]);
  const tpls = order.filter(k=>keys.includes(k)).map(k=>({key:k,...all[k]}));

  // Bei mehreren Themen: alle vorausgewählt und zu EINER Nachricht kombiniert
  const multi = tpls.length > 1;
  const selected = new Set(multi ? tpls.map(t=>t.key) : tpls.slice(0,1).map(t=>t.key));

  msgModalState = { id, name, icon: tpls[0]?.icon || "📣", templates: tpls, selected, multi };

  const initial = buildCombinedText(name, tpls, selected);

  const wrap = document.createElement("div");
  wrap.id = "msg-modal";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9000;display:flex;align-items:flex-end;justify-content:center;padding:0";
  wrap.innerHTML = `
    <div id="msg-sheet" style="background:#111;border-top:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom));animation:sheetUp .22s ease">
      <div style="width:36px;height:4px;background:#333;border-radius:99px;margin:0 auto 14px"></div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-size:17px;font-weight:800;color:var(--txt)">Nachricht an ${name}</div>
        <button onclick="closeMsgModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:0 4px;line-height:1">✕</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Landet direkt im persönlichen Chat des Mitglieds</div>

      ${tpls.length?`
      <div style="margin-bottom:12px">
        <div class="lbl" style="margin-bottom:7px">
          ${multi?`Themen wählen — werden zu <strong style="color:var(--gold)">einer Nachricht</strong> kombiniert`:"Vorlage"}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${tpls.map(t=>{
            const on = selected.has(t.key);
            return `<button onclick="toggleTemplate('${t.key}')" id="tpl-${t.key}"
              style="background:${on?"var(--gold)":"#1a1a1a"};border:1px solid ${on?"var(--gold)":"var(--border)"};border-radius:7px;padding:7px 11px;color:${on?"#000":"#aaa"};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">
              ${on&&multi?"✓ ":""}${t.icon} ${t.label}
            </button>`;
          }).join("")}
        </div>
      </div>`:""}

      <div class="lbl" style="margin-bottom:6px">Nachricht</div>
      <textarea id="msg-text" rows="8" placeholder="Deine Nachricht…"
        style="width:100%;background:#0d0d0d;border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--txt);font-size:15px;line-height:1.6;font-family:inherit;resize:vertical;outline:none;-webkit-appearance:none">${initial}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;margin-bottom:14px">
        <span id="msg-count" style="font-size:10px;color:#555">${initial.length} Zeichen</span>
        <button onclick="document.getElementById('msg-text').value='';updateMsgCount()"
          style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;font-family:inherit">Leeren</button>
      </div>

      <div style="display:flex;gap:8px">
        <button onclick="closeMsgModal()"
          style="flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:9px;padding:13px;color:#999;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">
          Abbrechen
        </button>
        <button onclick="submitMsgModal()"
          style="flex:2;background:var(--red);border:none;border-radius:9px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          Senden →
        </button>
      </div>
    </div>`;
  wrap.onclick = (e)=>{ if(e.target===wrap) closeMsgModal(); };
  document.body.appendChild(wrap);
  document.body.style.overflow="hidden";
  const ta = document.getElementById("msg-text");
  ta.addEventListener("input", updateMsgCount);
  if(!initial) setTimeout(()=>ta.focus(), 120);
}

// Baut aus mehreren Vorlagen eine zusammenhängende Nachricht
function buildCombinedText(name, tpls, selected){
  const chosen = tpls.filter(t=>selected.has(t.key));
  if(!chosen.length) return "";
  if(chosen.length===1) return chosen[0].text;

  const first = (name||"").split(" ")[0] || name;
  // Einleitung + Punkte als Liste + Abschluss
  const points = chosen.map(t=>`${t.icon} ${t.body}`).join("\n\n");
  return `Hallo ${first},\n\nzwei, drei Dinge von unserer Seite:\n\n${points}\n\nBei Fragen melde dich gerne jederzeit.\n\nSportliche Grüße\nDein PCN-Vorstand`
    .replace("zwei, drei Dinge", chosen.length===2?"zwei Dinge":chosen.length===3?"drei Dinge":"ein paar Dinge");
}

function toggleTemplate(key){
  const st = msgModalState;
  if(!st.multi){
    // Einzelmodus: umschalten
    st.selected = new Set([key]);
  } else {
    if(st.selected.has(key)) st.selected.delete(key);
    else st.selected.add(key);
    if(!st.selected.size) st.selected.add(key); // mind. eins
  }
  // Text neu bauen
  const ta = document.getElementById("msg-text");
  if(ta){ ta.value = buildCombinedText(st.name, st.templates, st.selected); updateMsgCount(); }
  // Icon: erstes gewähltes
  const firstSel = st.templates.find(t=>st.selected.has(t.key));
  st.icon = firstSel?.icon || "📣";
  // Buttons aktualisieren
  st.templates.forEach(t=>{
    const b=document.getElementById("tpl-"+t.key);
    if(!b) return;
    const on = st.selected.has(t.key);
    b.style.background = on?"var(--gold)":"#1a1a1a";
    b.style.borderColor = on?"var(--gold)":"var(--border)";
    b.style.color = on?"#000":"#aaa";
    b.innerHTML = `${on&&st.multi?"✓ ":""}${t.icon} ${t.label}`;
  });
}

function updateMsgCount(){
  const ta=document.getElementById("msg-text"), c=document.getElementById("msg-count");
  if(ta&&c) c.textContent = ta.value.length+" Zeichen";
}

function closeMsgModal(){
  const m=document.getElementById("msg-modal");
  if(m) m.remove();
  document.body.style.overflow="";
}

async function submitMsgModal(){
  const ta=document.getElementById("msg-text");
  const txt=(ta?.value||"").trim();
  if(!txt){ toast("Bitte Text eingeben","err"); ta?.focus(); return; }
  const {id,name,icon}=msgModalState;
  const res = await sendAdminMsg(id, txt, icon||"📣");
  if(res?.error){
    toast("Fehler: "+JSON.stringify(res.error).substring(0,60),"err");
    return;
  }
  closeMsgModal();
  toast(`✓ Nachricht an ${(name||"").split(" ")[0]} gesendet`);
  await loadAll();
}

  // Als gelesen markieren
  if(openChatId){
    const t=(DB.adminThreads||[]).find(x=>x.id===id);
    const unread=(t?.messages||[]).filter(m=>m.from_id!==ADMIN_UUID&&!m.read_at);

        {method:"PATCH",body:JSON.stringify({read_at:new Date().toISOString()})}).then(()=>loadAll());
    }
  }
}

function fmtTime(ts){
  if(!ts) return "";
  const d=new Date(ts); if(isNaN(d)) return "";
  const today=new Date();
  const isToday=d.toDateString()===today.toDateString();
  return isToday ? d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})
                 : d.toLocaleDateString("de-DE",{day:"2-digit",month:"short"});
}
function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ── Diagnose: kommen Admin-Nachrichten in der DB an? ──
async function runMsgDiagnostics(){
  const out=document.getElementById("diag-out");
  if(!out) return;
  const log=[];
  const line=(ok,txt,detail)=>{
    log.push(`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #131313">
      <span style="flex-shrink:0">${ok===null?"⏳":ok?"✅":"❌"}</span>
      <div style="flex:1"><div style="color:${ok===false?"#ef4444":"#ccc"}">${txt}</div>
      ${detail?`<div style="color:#555;font-size:10px;margin-top:2px">${detail}</div>`:""}</div>
    </div>`);
    out.innerHTML=log.join("");
  };

  out.innerHTML='<div style="color:#666">Prüfe…</div>';
  log.length=0;

  // 1. Threads-Tabelle lesbar?
  const th = await api("threads?select=id,participants,vehicle_name&limit=200");
  if(th.error){ line(false,"Threads nicht lesbar", JSON.stringify(th.error).slice(0,90)); return; }
  const allThreads = th.data||[];
  line(true, `${allThreads.length} Threads in der DB`);

  // 2. Admin-Threads (neues Format)
  const adminThreads = allThreads.filter(t=>String(t.id||"").startsWith("ad000000-0000-4000-8000-"));
  line(adminThreads.length>0, `${adminThreads.length} Admin-Threads (gültiges UUID-Format)`,
    adminThreads.length===0?"Noch keine Admin-Nachricht gesendet — oder alle fehlgeschlagen":"");

  // 3. Verwaiste Threads im alten Format?
  const broken = allThreads.filter(t=>String(t.id||"").startsWith("admin-"));
  if(broken.length) line(false, `${broken.length} Threads im alten, defekten Format`, "Diese sollten gelöscht werden");

  // 4. Nachrichten vorhanden?
  const ms = await api("messages?select=id,thread_id,from_id,text,created_at&order=created_at.desc&limit=100");
  if(ms.error){ line(false,"Messages nicht lesbar", JSON.stringify(ms.error).slice(0,90)); return; }
  const adminMsgs=(ms.data||[]).filter(m=>m.from_id===ADMIN_UUID);
  line(adminMsgs.length>0, `${adminMsgs.length} Admin-Nachrichten in der DB`,
    adminMsgs.length?`Zuletzt: ${new Date(adminMsgs[0].created_at).toLocaleString("de-DE")}`:"Keine gefunden");

  // 5. Zuordnung prüfen: hat jede Admin-Nachricht einen gültigen Thread mit Empfänger?
  let orphans=0, ok=0;
  adminMsgs.forEach(m=>{
    const t=allThreads.find(x=>x.id===m.thread_id);
    if(!t){ orphans++; return; }
    const hasMember=(t.participants||[]).some(p=>p!==ADMIN_UUID);
    if(hasMember) ok++; else orphans++;
  });
  line(orphans===0, `${ok} Nachrichten korrekt zugeordnet${orphans?`, ${orphans} verwaist`:""}`,
    orphans?"Verwaiste Nachrichten erreichen kein Mitglied":"");

  // 6. Live-Test
  line(null, "Live-Test: sende Testnachricht an dich selbst…");
  const testUser = DB.members[0];
  if(!testUser){ line(false,"Kein Mitglied für Test vorhanden"); return; }
  const res = await sendAdminMsg(testUser.id, "🔧 Diagnose-Testnachricht — kann ignoriert werden.", "🔧");
  if(res?.error){
    line(false, "Testnachricht fehlgeschlagen", JSON.stringify(res.error).slice(0,110));
  } else {
    // Verifizieren dass sie wirklich da ist
    const tid = adminThreadId(testUser.id);
    const check = await api(`messages?thread_id=eq.${tid}&order=created_at.desc&limit=1`);
    const found = check.data?.length>0;
    line(found, found
      ? `Testnachricht an ${testUser.name} gespeichert und verifiziert`
      : "Testnachricht gesendet, aber nicht in der DB auffindbar");
  }
}

  else{await api("events",{method:"POST",body:JSON.stringify({...payload,created_at:new Date().toISOString()})});toast("✓ Event erstellt");}
  toggleEvForm(); await loadAll();
}
async function delEvent(id,name){
  const parts=DB.participants.filter(p=>p.event_id===id&&p.status!=="cancelled");
  const conf=parts.filter(p=>p.status==="confirmed").length;
  confirmDanger({
    title:`"${name}" löschen?`,
    body:`Das Event wird dauerhaft entfernt. Diese Aktion kann <strong style="color:#ddd">nicht rückgängig</strong> gemacht werden.`,
    warn: parts.length
      ? `<strong style="color:#ff9">${parts.length} Anmeldung${parts.length!==1?"en":""}</strong> gehen verloren${conf?`, davon ${conf} bereits bestätigt`:""}.<br>Die Mitglieder werden <strong>nicht</strong> automatisch informiert — ggf. vorher eine Nachricht senden.`
      : null,
    confirmLabel:"Event löschen",
    onConfirm: async()=>{
      await api(`events?id=eq.${id}`,{method:"DELETE"});
      toast("Event gelöscht");
      await loadAll();
    }
  });
}

// Bestätigung vor Veröffentlichung — zeigt Reichweite
function confirmPublish({title, reach, preview, onConfirm}){
  const wrap=document.createElement("div");
  wrap.id="pub-modal";
  wrap.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px";
  wrap.innerHTML=`
    <div style="background:#111;border:1px solid var(--border);border-radius:16px;max-width:420px;width:100%;padding:22px;animation:sheetUp .2s ease">
      <div style="font-size:18px;font-weight:800;color:var(--txt);margin-bottom:10px">📬 ${title}</div>
      <div style="background:#0d0d0d;border-radius:9px;padding:11px;margin-bottom:12px">
        <div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Betreff</div>
        <div style="font-size:13px;color:#ddd;font-weight:600">${preview}</div>
      </div>
      <div style="background:#5b8fff0d;border:1px solid #5b8fff33;border-radius:9px;padding:11px;margin-bottom:18px">
        <div style="font-size:13px;color:#8ab;line-height:1.6">
          Erscheint sofort im App-Feed von <strong style="color:#fff">${reach} Mitglied${reach!==1?"ern":""}</strong>.
          Ein Zurückholen ist nicht möglich.
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="closePub()" style="flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:9px;padding:12px;color:#aaa;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Nochmal prüfen</button>
        <button id="pub-go" style="flex:1;background:var(--red);border:none;border-radius:9px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Veröffentlichen</button>
      </div>
    </div>`;
  wrap.onclick=(e)=>{ if(e.target===wrap) closePub(); };
  document.body.appendChild(wrap);
  document.getElementById("pub-go").onclick=()=>{ closePub(); onConfirm(); };
}
function closePub(){ document.getElementById("pub-modal")?.remove(); }

// Deterministische Admin-Thread-UUID pro Mitglied.
// Fester Namespace + letzte 12 Hex-Zeichen der User-UUID
// → gleiche User-ID ergibt immer dieselbe Thread-ID, gültiges UUID-Format.
function adminThreadId(userId){
  const tail = String(userId||"").replace(/-/g,"").slice(-12).padStart(12,"0");
  return `ad000000-0000-4000-8000-${tail}`;
}

async function sendAdminMsg(userId,text,icon="📋"){
  const threadId = adminThreadId(userId);
  try{
    const ex = await api("threads?id=eq."+threadId);
    if(!ex.data?.length){
      const t = await api("threads",{method:"POST",body:JSON.stringify({
        id: threadId,
        participants: [userId, ADMIN_UUID],
        vehicle_name: "PCN Vorstand",
        anonymous: false,
        created_at: new Date().toISOString()
      })});
      if(t.error){ console.error("Thread-Anlage fehlgeschlagen:",t.error); return {error:t.error}; }
    }
    const m = await api("messages",{method:"POST",body:JSON.stringify({
      thread_id: threadId,
      from_id: ADMIN_UUID,
      text: icon+" "+text,
      is_system: true,
      created_at: new Date().toISOString()
    })});
    if(m.error){ console.error("Nachricht fehlgeschlagen:",m.error); return {error:m.error}; }
    return {ok:true};
  }catch(e){
    console.error("sendAdminMsg:",e);
    return {error:e.message};
  }
}
