<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCN Admin — Porsche Club Nürburgring</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#D5001C;--dark:#080808;--card:#111;--card2:#161616;--border:#1e1e1e;--muted:#555;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--gold:#C8A96E;--blue:#6b7fff}
    body{background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh}
    /* ── Header ── */
    .hdr{background:#fff;border-bottom:3px solid var(--red);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .hdr-l{display:flex;align-items:center;gap:12px}
    .hdr-logo{height:34px;object-fit:contain}
    .hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:#111;letter-spacing:.5px}
    .hdr-badge{font-size:9px;background:var(--red);color:#fff;padding:2px 7px;border-radius:3px;font-weight:800;letter-spacing:1px}
    .hdr-r{display:flex;align-items:center;gap:12px;font-size:12px;color:#666}
    /* ── Layout ── */
    .layout{display:flex;min-height:calc(100vh - 56px)}
    .sidebar{width:200px;background:#0a0a0a;border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
    .nav-sec{font-size:9px;font-weight:800;color:#2a2a2a;letter-spacing:2px;text-transform:uppercase;padding:14px 18px 5px}
    .nav-item{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-left:3px solid transparent;transition:all .12s;white-space:nowrap}
    .nav-item:hover{color:var(--white);background:#111}
    .nav-item.active{color:var(--white);border-left-color:var(--red);background:#111}
    .nav-badge{background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:auto}
    .main{flex:1;padding:24px;overflow-y:auto;max-width:1100px}
    /* ── Cards ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
    .card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--white);margin-bottom:20px;display:flex;align-items:center;gap:10px}
    /* ── Stats Grid ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 14px;cursor:default}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;line-height:1}
    .stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
    .stat-sub{font-size:11px;margin-top:5px}
    /* ── Table ── */
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{text-align:left;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-bottom:1px solid var(--border)}
    .tbl td{padding:10px 12px;border-bottom:1px solid #131313;vertical-align:middle}
    .tbl tr:hover td{background:#0d0d0d}
    /* ── Badges ── */
    .b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800}
    .b-green{background:#16a34a22;color:var(--green);border:1px solid #16a34a33}
    .b-red{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
    .b-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b33}
    .b-blue{background:#6b7fff22;color:var(--blue);border:1px solid #6b7fff33}
    .b-gray{background:#22222244;color:var(--muted);border:1px solid var(--border)}
    /* ── Form elements ── */
    .inp{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;outline:none}
    .inp:focus{border-color:var(--red)}
    .btn{background:var(--red);border:none;border-radius:8px;padding:9px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
    .btn:hover{background:#b0001a}
    .btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{color:var(--white);border-color:#444;background:none}
    .btn-green{background:#16a34a}
    .btn-green:hover{background:#15803d}
    select{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif}
    textarea{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;outline:none;resize:vertical}
    textarea:focus{border-color:var(--red)}
    label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
    /* ── Mini chart ── */
    .bar{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:6px}
    .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
    /* ── Login ── */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;width:360px}
    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap}
    .toast.err{border-color:#ef4444;color:#ef4444}
    /* ── Activity feed ── */
    .activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #131313;align-items:flex-start}
    .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
    /* ── 2-col grid ── */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    @media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}.sidebar{display:none}}
    .divider{height:1px;background:var(--border);margin:16px 0}
    .section-title{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
    .chip{display:inline-flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted)}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
// Inline config — admin page is gitignored anyway
window.PCN_CONFIG = {
  supabaseUrl: "https://xsyuhfleesstrchcwspg.supabase.co",
  supabaseKey: "sb_publishable_xmmKWwXaQliEBAOIFPM8ig_srQP3zED"
};
</script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const ADMIN_CODE = "PCN-ADMIN-2026";
const BEITRAG = 95;
const LOGO = "https://www.pcn-nuerburgring.de/wp-content/uploads/2020/07/PCN-Logo_2020_internet.jpg";

async function sb(path, opts={}) {
  const cfg = window.PCN_CONFIG||{};
  if(!cfg.supabaseUrl) return {data:null,error:"No config"};
  const url = cfg.supabaseUrl+"/rest/v1/"+path;
  const headers = {"apikey":cfg.supabaseKey,"Authorization":"Bearer "+cfg.supabaseKey,
    "Content-Type":"application/json","Prefer":"return=representation",...(opts.headers||{})};
  try {
    const r = await fetch(url,{...opts,headers});
    const d = await r.json();
    return r.ok ? {data:d} : {data:null,error:d.message};
  } catch(e){ return {data:null,error:e.message}; }
}

// ── Root ─────────────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(()=>sessionStorage.getItem("pcn_admin")==="1");
  const [code, setCode] = useState("");
  const [tab, setTab] = useState("dashboard");
  const [toast, setToast] = useState(null);
  const [members, setMembers] = useState([]);
  const [events, setEvents] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [threads, setThreads] = useState([]);
  const [loading, setLoading] = useState(false);

  const toast_ = (msg,type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3200); };

  const load = useCallback(async()=>{
    setLoading(true);
    const [m,e,v,t] = await Promise.all([
      sb("users?select=*&order=created_at.desc"),
      sb("events?select=*&order=date.asc"),
      sb("vehicles?select=*&order=created_at.desc"),
      sb("threads?select=*&order=created_at.desc&limit=50"),
    ]);
    if(m.data) setMembers(m.data);
    if(e.data) setEvents(e.data);
    if(v.data) setVehicles(v.data);
    if(t.data) setThreads(t.data);
    setLoading(false);
  },[]);

  const login = () => {
    if(code.trim().toUpperCase()===ADMIN_CODE){ sessionStorage.setItem("pcn_admin","1"); setAuthed(true); }
    else toast_("Falscher Code","err");
  };

  useEffect(()=>{ if(authed) load(); },[authed]);

  if(!authed) return <Login code={code} setCode={setCode} login={login} toast={toast}/>;

  const TABS = [
    {sec:"Übersicht", items:[
      {id:"dashboard",ic:"📊",lb:"Dashboard"},
      {id:"activity",ic:"⚡",lb:"Aktivität"},
    ]},
    {sec:"Mitglieder", items:[
      {id:"members",ic:"👥",lb:"Mitglieder", badge: members.filter(m=>m.role==="guest").length||null},
      {id:"payments",ic:"💳",lb:"Zahlungen", badge: members.filter(m=>m.role==="member"&&!m.beitrag_bezahlt).length||null},
      {id:"vehicles_tab",ic:"🚗",lb:"Fahrzeuge"},
    ]},
    {sec:"Events & Inhalt", items:[
      {id:"events_tab",ic:"🏁",lb:"Events"},
      {id:"newsletter",ic:"📬",lb:"Newsletter"},
      {id:"newsfeed",ic:"📰",lb:"News-Feed"},
    ]},
    {sec:"System", items:[
      {id:"settings",ic:"⚙️",lb:"Einstellungen"},
    ]},
  ];

  return (
    <div>
      {toast&&<div className={`toast ${toast.type==="err"?"err":""}`}>{toast.msg}</div>}
      <header className="hdr">
        <div className="hdr-l">
          <img src={LOGO} className="hdr-logo" alt="" onError={e=>e.target.style.display="none"}/>
          <div>
            <div className="hdr-title">CLUBVERWALTUNG</div>
            <div style={{display:"flex",gap:6,marginTop:2}}>
              <span className="hdr-badge">ADMIN</span>
              {loading&&<span className="hdr-badge" style={{background:"#333"}}>LÄDT…</span>}
            </div>
          </div>
        </div>
        <div className="hdr-r">
          <span>Porsche Club Nürburgring e.V.</span>
          <button className="btn btn-sm btn-ghost" onClick={()=>{sessionStorage.removeItem("pcn_admin");setAuthed(false);}}>Abmelden</button>
          <button className="btn btn-sm" onClick={load}>↺ Aktualisieren</button>
        </div>
      </header>

      <div className="layout">
        <nav className="sidebar">
          {TABS.map(sec=>(
            <div key={sec.sec}>
              <div className="nav-sec">{sec.sec}</div>
              {sec.items.map(item=>(
                <div key={item.id} className={`nav-item ${tab===item.id?"active":""}`} onClick={()=>setTab(item.id)}>
                  <span>{item.ic}</span> {item.lb}
                  {item.badge>0&&<span className="nav-badge">{item.badge}</span>}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <main className="main">
          {tab==="dashboard"  &&<Dashboard members={members} events={events} vehicles={vehicles} threads={threads} toast_={toast_} reload={load}/>}
          {tab==="activity"   &&<Activity members={members} vehicles={vehicles} threads={threads}/>}
          {tab==="members"    &&<Members members={members} toast_={toast_} reload={load}/>}
          {tab==="payments"   &&<Payments members={members} toast_={toast_} reload={load}/>}
          {tab==="vehicles_tab"&&<VehiclesTab vehicles={vehicles} members={members}/>}
          {tab==="events_tab" &&<EventsTab events={events} toast_={toast_} reload={load}/>}
          {tab==="newsletter" &&<Newsletter members={members} toast_={toast_}/>}
          {tab==="newsfeed"   &&<NewsFeed toast_={toast_}/>}
          {tab==="settings"   &&<Settings toast_={toast_}/>}
        </main>
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────────────────
function Login({code,setCode,login,toast}) {
  return (
    <div className="login-wrap">
      {toast&&<div className={`toast ${toast.type==="err"?"err":""}`}>{toast.msg}</div>}
      <div className="login-card">
        <div style={{background:"#fff",borderRadius:10,padding:20,textAlign:"center",marginBottom:24}}>
          <img src={LOGO} style={{height:56,objectFit:"contain"}} alt="" onError={e=>e.target.style.display="none"}/>
        </div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:4}}>Club-Administration</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:24}}>Nur für autorisierte Vorstandsmitglieder</div>
        <label>Admin-Passcode</label>
        <input className="inp" type="password" placeholder="••••••••••••" value={code}
          onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}
          style={{marginBottom:12}}/>
        <button className="btn" style={{width:"100%",padding:13}} onClick={login}>Anmelden →</button>
        <div style={{fontSize:11,color:"#222",textAlign:"center",marginTop:20}}>Powered by <span style={{color:"var(--gold)"}}>QAR.Gallery</span></div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({members,events,vehicles,threads,toast_,reload}) {
  const aktive   = members.filter(m=>m.role==="member");
  const gaeste   = members.filter(m=>m.role==="guest");
  const bezahlt  = aktive.filter(m=>m.beitrag_bezahlt);
  const offen    = aktive.filter(m=>!m.beitrag_bezahlt);
  const nextEvs  = events.filter(e=>new Date(e.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const totalRev = bezahlt.length * BEITRAG;
  const pendRev  = offen.length * BEITRAG;
  const bezPct   = aktive.length ? Math.round(bezahlt.length/aktive.length*100) : 0;

  // New members last 30 days
  const thirtyDays = new Date(Date.now()-30*86400000);
  const newMembers = members.filter(m=>m.created_at&&new Date(m.created_at)>thirtyDays);

  const fmt = (d) => d ? new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"}) : "—";

  return (
    <div>
      <div className="page-title">📊 Dashboard</div>

      {/* ── KPIs ── */}
      <div className="stat-grid">
        {[
          {val:aktive.length,  label:"Aktive Mitglieder",  sub:`+${newMembers.filter(m=>m.role==="member").length} diese Woche`, color:"var(--white)"},
          {val:gaeste.length,  label:"Gast-Accounts",       sub:"Warten auf Freigabe", color:"var(--amber)"},
          {val:`${bezPct}%`,   label:"Beitrag bezahlt",     sub:`${bezahlt.length} von ${aktive.length}`, color:"var(--green)"},
          {val:`€${totalRev}`, label:"Einnahmen 2026",       sub:`€${pendRev} offen`, color:"var(--gold)"},
          {val:vehicles.length,label:"Fahrzeuge im System",  sub:`${Math.round(vehicles.length/Math.max(aktive.length,1)*10)/10} pro Mitglied`, color:"var(--blue)"},
          {val:nextEvs.length, label:"Anstehende Events",    sub:nextEvs[0]?fmt(nextEvs[0].date):"Keine", color:"var(--red)"},
        ].map(s=>(
          <div key={s.label} className="stat">
            <div className="stat-val" style={{color:s.color}}>{s.val}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-sub" style={{color:s.color==="var(--white)"?"var(--muted)":s.color,opacity:.8}}>{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="grid2">
        {/* ── Beitragsstatus ── */}
        <div className="card">
          <div className="section-title">💳 Beitragsstatus 2026</div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:13,color:"var(--muted)"}}>Bezahlt</span>
            <span style={{fontSize:13,fontWeight:700,color:"var(--green)"}}>{bezahlt.length} × € {BEITRAG}</span>
          </div>
          <div className="bar"><div className="bar-fill" style={{width:`${bezPct}%`,background:"var(--green)"}}/></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,marginBottom:6}}>
            <span style={{fontSize:13,color:"var(--muted)"}}>Offen</span>
            <span style={{fontSize:13,fontWeight:700,color:"var(--amber)"}}>{offen.length} × € {BEITRAG}</span>
          </div>
          <div className="bar"><div className="bar-fill" style={{width:`${100-bezPct}%`,background:"var(--amber)"}}/></div>
          {offen.length>0&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>Offene Zahlungen:</div>
              {offen.slice(0,4).map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #131313"}}>
                  <span style={{fontSize:12,color:"var(--white)"}}>{m.name||m.email}</span>
                  <button className="btn btn-sm btn-green" onClick={async()=>{
                    await sb(`users?id=eq.${m.id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:true})});
                    toast_("✓ Bezahlt markiert"); reload();
                  }}>✓ Bezahlt</button>
                </div>
              ))}
              {offen.length>4&&<div style={{fontSize:11,color:"var(--muted)",marginTop:6}}>+{offen.length-4} weitere → Zahlungen-Tab</div>}
            </div>
          )}
        </div>

        {/* ── Nächste Events ── */}
        <div className="card">
          <div className="section-title">🏁 Nächste Events</div>
          {nextEvs.length===0
            ? <div style={{color:"var(--muted)",fontSize:13}}>Keine Events geplant</div>
            : nextEvs.slice(0,5).map(ev=>{
                const daysLeft = Math.ceil((new Date(ev.date)-new Date())/86400000);
                return (
                  <div key={ev.id} style={{display:"flex",gap:12,alignItems:"center",padding:"8px 0",borderBottom:"1px solid #131313"}}>
                    <div style={{minWidth:40,textAlign:"center"}}>
                      <div style={{fontSize:16,fontWeight:900,color:"var(--red)",fontFamily:"'Barlow Condensed',sans-serif"}}>{new Date(ev.date).getDate()}</div>
                      <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase"}}>{new Date(ev.date).toLocaleString("de-DE",{month:"short"})}</div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:"var(--white)"}}>{ev.name}</div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{ev.location}</div>
                    </div>
                    <span className={`b ${daysLeft<=7?"b-red":daysLeft<=30?"b-amber":"b-gray"}`}>{daysLeft}d</span>
                  </div>
                );
              })
          }
        </div>
      </div>

      <div className="grid2">
        {/* ── Neue Mitglieder ── */}
        <div className="card">
          <div className="section-title">🆕 Neue Registrierungen (30 Tage)</div>
          {newMembers.length===0
            ? <div style={{color:"var(--muted)",fontSize:13}}>Keine neuen Anmeldungen</div>
            : newMembers.slice(0,6).map(m=>(
              <div key={m.id} style={{display:"flex",gap:10,alignItems:"center",padding:"7px 0",borderBottom:"1px solid #131313"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"var(--white)",flexShrink:0}}>
                  {(m.name||m.email||"?")[0].toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"var(--white)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name||"—"}</div>
                  <div style={{fontSize:10,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.email}</div>
                </div>
                <span className={`b ${m.role==="member"?"b-green":"b-amber"}`}>{m.role==="member"?"Mitglied":"Gast"}</span>
                {m.role==="guest"&&(
                  <button className="btn btn-sm btn-green" onClick={async()=>{
                    await sb(`users?id=eq.${m.id}`,{method:"PATCH",body:JSON.stringify({role:"member"})});
                    toast_("✓ Als Mitglied freigegeben"); reload();
                  }}>→ Freigeben</button>
                )}
              </div>
            ))
          }
        </div>

        {/* ── Fahrzeuge ── */}
        <div className="card">
          <div className="section-title">🚗 Fahrzeuge im System</div>
          {vehicles.slice(0,6).map(v=>(
            <div key={v.id} style={{display:"flex",gap:10,alignItems:"center",padding:"7px 0",borderBottom:"1px solid #131313"}}>

// ── Activity ──────────────────────────────────────────────────────────────────
function Activity({members,vehicles,threads}) {
  const fmt = (d) => {
    if(!d) return "—";
    const date = new Date(d);
    const today = new Date();
    const diff = Math.floor((today-date)/86400000);
    if(diff===0) return "Heute "+date.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
    if(diff===1) return "Gestern";
    return date.toLocaleDateString("de-DE",{day:"2-digit",month:"short"});
  };

  // Build activity feed from all data
  const activities = [
    ...members.map(m=>({ts:m.created_at, type:"member", text:`${m.name||m.email} registriert`, role:m.role, color:"var(--blue)"})),
    ...vehicles.map(v=>({ts:v.created_at, type:"vehicle", text:`${v.hersteller} ${v.modell} hinzugefügt`, color:"var(--gold)"})),
    ...threads.map(t=>({ts:t.created_at, type:"chat", text:`Neuer Chat: ${t.vehicle_name||t.vehicleName||"Fahrzeug"}`, color:"var(--green)"})),
  ].filter(a=>a.ts).sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,40);

  return (
    <div>
      <div className="page-title">⚡ Aktivitätsfeed</div>
      <div className="card">
        {activities.length===0
          ? <div style={{color:"var(--muted)",fontSize:13,padding:"20px 0",textAlign:"center"}}>Keine Aktivitäten</div>
          : activities.map((a,i)=>(
            <div key={i} className="activity-item">
              <div className="activity-dot" style={{background:a.color}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:"var(--white)"}}>{a.text}</div>
                {a.role&&<span className={`b ${a.role==="member"?"b-green":"b-amber"}`} style={{marginTop:3,display:"inline-block"}}>{a.role==="member"?"Mitglied":"Gast"}</span>}
              </div>
              <div style={{fontSize:11,color:"var(--muted)",flexShrink:0}}>{fmt(a.ts)}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── Members ───────────────────────────────────────────────────────────────────
function Members({members,toast_,reload}) {
  const [search,setSearch] = useState("");
  const [filter,setFilter] = useState("all");
  const filtered = members.filter(m=>{
    if(filter==="member"&&m.role!=="member") return false;
    if(filter==="guest"&&m.role!=="guest") return false;
    const q=search.toLowerCase();
    if(q&&!m.name?.toLowerCase().includes(q)&&!m.email?.toLowerCase().includes(q)&&!m.member_nr?.includes(q)) return false;
    return true;
  });
  const fmt = d => d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"2-digit"}):"—";

  const del = async(m) => {
    if(!confirm(`${m.name||m.email} wirklich löschen?`)) return;
    await sb(`users?id=eq.${m.id}`,{method:"DELETE"}); toast_("Gelöscht"); reload();
  };
  const upgrade = async(m) => {
    await sb(`users?id=eq.${m.id}`,{method:"PATCH",body:JSON.stringify({role:"member"})});
    toast_("✓ Als Mitglied freigegeben"); reload();
  };

  return (
    <div>
      <div className="page-title">👥 Mitgliederverwaltung <span style={{fontSize:14,fontWeight:400,color:"var(--muted)"}}>({members.length} gesamt)</span></div>
      <div className="card">
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <input className="inp" placeholder="🔍 Name, E-Mail oder Mitgliedsnr." value={search}
            onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:180}}/>
          <select value={filter} onChange={e=>setFilter(e.target.value)} style={{minWidth:130}}>
            <option value="all">Alle ({members.length})</option>
            <option value="member">Mitglieder ({members.filter(m=>m.role==="member").length})</option>
            <option value="guest">Gäste ({members.filter(m=>m.role==="guest").length})</option>
          </select>
        </div>
        <div style={{overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr>
              <th>Mitglied</th><th>Nr.</th><th>Status</th><th>Beitrag</th>
              <th>Fahrzeuge</th><th>Seit</th><th>Zuletzt aktiv</th><th>Aktionen</th>
            </tr></thead>
            <tbody>
              {filtered.map(m=>(
                <tr key={m.id}>
                  <td>
                    <div style={{fontWeight:600,color:"var(--white)"}}>{m.name||"—"}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{m.email}</div>
                  </td>
                  <td style={{fontSize:12,color:"var(--muted)",fontFamily:"monospace"}}>{m.member_nr||"—"}</td>
                  <td><span className={`b ${m.role==="member"?"b-green":m.role==="guest"?"b-amber":"b-gray"}`}>
                    {m.role==="member"?"Mitglied":m.role==="guest"?"Gast":"—"}</span></td>
                  <td><span className={`b ${m.beitrag_bezahlt?"b-green":"b-red"}`}>
                    {m.beitrag_bezahlt?"✓ Bezahlt":"✗ Offen"}</span></td>
                  <td style={{fontSize:12,color:"var(--muted)",textAlign:"center"}}>—</td>
                  <td style={{fontSize:11,color:"var(--muted)"}}>{fmt(m.created_at)}</td>
                  <td style={{fontSize:11,color:"var(--muted)"}}>{fmt(m.last_seen)}</td>
                  <td>
                    <div style={{display:"flex",gap:6"}}>
                      {m.role==="guest"&&<button className="btn btn-sm btn-green" onClick={()=>upgrade(m)}>→ Mitglied</button>}
                      <button className="btn btn-sm" style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444433"}}
                        onClick={()=>del(m)}>✕</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length===0&&<div style={{textAlign:"center",padding:"24px",color:"var(--muted)"}}>Keine Ergebnisse</div>}
        </div>
      </div>
    </div>
  );
}

// ── Payments ──────────────────────────────────────────────────────────────────
function Payments({members,toast_,reload}) {
  const aktive = members.filter(m=>m.role==="member");
  const offen = aktive.filter(m=>!m.beitrag_bezahlt);
  const bezahlt = aktive.filter(m=>m.beitrag_bezahlt);

  const markPaid = async(id) => {
    await sb(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:true})});
    toast_("✓ Bezahlt markiert"); reload();
  };
  const markUnpaid = async(id) => {
    await sb(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:false})});
    toast_("Zurückgesetzt"); reload();
  };
  const exportCSV = () => {
    const rows=[["Name","E-Mail","Nr.","Status","Betrag"],...aktive.map(m=>[m.name,m.email,m.member_nr||"",m.beitrag_bezahlt?"Bezahlt":"Offen",BEITRAG+" EUR"])];
    const csv=rows.map(r=>r.join(";")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="PCN_Beitraege_2026.csv";a.click();
    toast_("CSV exportiert ✓");
  };

  return (
    <div>
      <div className="page-title">💳 Zahlungsverwaltung</div>
      <div className="stat-grid" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <div className="stat"><div className="stat-val" style={{color:"var(--green)"}}>{bezahlt.length}</div><div className="stat-label">Bezahlt</div><div className="stat-sub" style={{color:"var(--green)"}}>€ {bezahlt.length*BEITRAG}</div></div>
        <div className="stat"><div className="stat-val" style={{color:"#ef4444"}}>{offen.length}</div><div className="stat-label">Offen</div><div className="stat-sub" style={{color:"#ef4444"}}>€ {offen.length*BEITRAG} ausstehend</div></div>
        <div className="stat"><div className="stat-val">{aktive.length}</div><div className="stat-label">Gesamt</div><div className="stat-sub" style={{color:"var(--muted)"}}>€ {aktive.length*BEITRAG} Soll</div></div>
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="section-title" style={{margin:0}}>Offene Beiträge</div>
          <button className="btn btn-sm btn-ghost" onClick={exportCSV}>📥 CSV Export</button>
        </div>
        {offen.length===0
          ? <div style={{color:"var(--green)",fontSize:13}}>✓ Alle Beiträge bezahlt</div>
          : <table className="tbl"><thead><tr><th>Mitglied</th><th>Nr.</th><th>Betrag</th><th>Aktion</th></tr></thead>
            <tbody>{offen.map(m=>(
              <tr key={m.id}>
                <td><div style={{fontWeight:600}}>{m.name||"—"}</div><div style={{fontSize:11,color:"var(--muted)"}}>{m.email}</div></td>
                <td style={{fontSize:11,color:"var(--muted)"}}>{m.member_nr||"—"}</td>
                <td style={{fontWeight:700,color:"#ef4444"}}>€ {BEITRAG}</td>
                <td><button className="btn btn-sm btn-green" onClick={()=>markPaid(m.id)}>✓ Bezahlt</button></td>
              </tr>
            ))}</tbody></table>
        }
      </div>
      <div className="card">
        <div className="section-title">Bezahlte Beiträge</div>
        <table className="tbl"><thead><tr><th>Mitglied</th><th>Nr.</th><th>Betrag</th><th></th></tr></thead>
        <tbody>{bezahlt.map(m=>(
          <tr key={m.id}>
            <td><div style={{fontWeight:600}}>{m.name||"—"}</div><div style={{fontSize:11,color:"var(--muted)"}}>{m.email}</div></td>
            <td style={{fontSize:11,color:"var(--muted)"}}>{m.member_nr||"—"}</td>
            <td><span className="b b-green">✓ € {BEITRAG}</span></td>
            <td><button className="btn btn-sm btn-ghost" onClick={()=>markUnpaid(m.id)}>Zurücksetzen</button></td>
          </tr>
        ))}</tbody></table>
      </div>
    </div>
  );
}

function EventsTab({events,toast_,reload}) {
  const [form,setForm] = useState({name:"",date:"",location:"",category:"Clubabend",desc:"",price:""});

  const save = async() => {
    if(!form.name||!form.date) return toast_("Name + Datum erforderlich","err");
    await sb("events",{method:"POST",body:JSON.stringify({...form,created_at:new Date().toISOString()})});
    toast_("Event erstellt ✓"); setShow(false); setForm({name:"",date:"",location:"",category:"Clubabend",desc:"",price:""}); reload();
  };
  const del = async(ev) => {
    if(!confirm(`"${ev.name}" löschen?`)) return;
    await sb(`events?id=eq.${ev.id}`,{method:"DELETE"}); toast_("Gelöscht"); reload();
  };

  return (
    <div>
      <div className="page-title">🏁 Events</div>
      <div style={{marginBottom:16}}><button className="btn" onClick={()=>setShow(!show)}>+ Neues Event</button></div>

          <div className="grid2" style={{marginBottom:10}}>

            <div><label>Datum *</label><input className="inp" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
          </div>
          <div className="grid2" style={{marginBottom:10}}>
            <div><label>Ort</label><input className="inp" value={form.location} onChange={e=>setForm(p=>({...p,location:e.target.value}))}/></div>
            <div><label>Kategorie</label><select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
              {["Clubabend","Trackday","Ausfahrt","Oldtimer","Rennsport","Saisonfahrt"].map(c=><option key={c}>{c}</option>)}
            </select></div>
          </div>
          <div className="grid2" style={{marginBottom:10}}>
            <div><label>Preis</label><input className="inp" value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))}/></div>
          </div>
          <label>Beschreibung</label>
          <textarea value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} style={{minHeight:80,marginBottom:12}}/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" onClick={save}>✓ Erstellen</button>
            <button className="btn btn-ghost" onClick={()=>setShow(false)}>Abbrechen</button>
          </div>
        </div>
      )}
      <div className="card">
        <table className="tbl">
          <thead><tr><th>Event</th><th>Datum</th><th>Ort</th><th>Kategorie</th><th>Status</th><th></th></tr></thead>
          <tbody>{sorted.map(ev=>{
            const past = new Date(ev.date)<now;
            const daysLeft = Math.ceil((new Date(ev.date)-now)/86400000);
            return (
              <tr key={ev.id}>
                <td style={{fontWeight:600,color:"var(--white)"}}>{ev.name}</td>
                <td style={{fontSize:12}}>{new Date(ev.date).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"})}</td>
                <td style={{fontSize:12,color:"var(--muted)"}}>{ev.location||"—"}</td>
                <td><span className="b b-gray">{ev.category||"—"}</span></td>
                <td><span className={`b ${past?"b-gray":daysLeft<=7?"b-red":"b-green"}`}>{past?"Abgeschlossen":daysLeft<=7?"Bald":"Geplant"}</span></td>
                <td><button className="btn btn-sm" style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444433"}} onClick={()=>del(ev)}>✕</button></td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
    </div>
  );
}

          <label>Beitrag 2026 (EUR)</label>
          <input className="inp" type="number" defaultValue="95" style={{marginBottom:8}}/>
          <button className="btn" onClick={()=>toast_("Gespeichert ✓")}>Speichern</button>
        </div>
        <div className="card">
          <div className="section-title">Admin-Zugang</div>
          <label>Admin-Passcode</label>
          <input className="inp" type="password" defaultValue="PCN-ADMIN-2026" style={{marginBottom:8}}/>
          <button className="btn" onClick={()=>toast_("Gespeichert ✓")}>Ändern</button>
        </div>
        <div className="card">
          <div className="section-title">Systemstatus</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[["Supabase","Verbunden","var(--green)"],["App-URL","qar.gallery/pcn/","var(--muted)"],["Admin","qar.gallery/pcn/admin.html","var(--muted)"]].map(([k,v,c])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                <span style={{color:"var(--muted)"}}>{k}</span>
                <span style={{color:c}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
