<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCN Admin — Porsche Club Nürburgring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&family=Barlow+Semi+Condensed:wght@600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#D5001C;--dark:#0a0a0a;--card:#111;--border:#222;
      --muted:#666;--white:#fff;--green:#22c55e;--amber:#f59e0b;
      --gold:#C8A96E;
    }
    body{background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh}
    /* Header */
    .header{background:#fff;border-bottom:3px solid var(--red);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:12px}
    .header-logo{height:36px;object-fit:contain}
    .header-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#111;letter-spacing:1px}
    .header-badge{font-size:10px;background:var(--red);color:#fff;padding:2px 8px;border-radius:4px;font-weight:800;letter-spacing:1px}
    .header-user{font-size:12px;color:#666;display:flex;align-items:center;gap:8px}
    /* Login */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:380px}
    .login-logo-wrap{text-align:center;background:#fff;border-radius:12px;padding:20px;margin-bottom:24px}
    .login-logo{height:60px;object-fit:contain}
    .login-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;margin-bottom:4px}
    .login-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
    .inp{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--white);font-size:14px;font-family:'Barlow',sans-serif;margin-bottom:10px;outline:none}
    .inp:focus{border-color:var(--red)}
    .btn{background:var(--red);border:none;border-radius:10px;padding:13px 20px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;width:100%}
    .btn:hover{background:#b0001a}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-sm{padding:7px 14px;font-size:12px;width:auto;border-radius:7px}
    .btn-green{background:#16a34a}
    /* Layout */
    .layout{display:flex;min-height:calc(100vh - 63px)}
    .sidebar{width:220px;background:#080808;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;position:sticky;top:63px;height:calc(100vh - 63px);overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-left:3px solid transparent;transition:all .15s}
    .nav-item:hover{color:var(--white);background:#111}
    .nav-item.active{color:var(--white);border-left-color:var(--red);background:#111}
    .nav-section{font-size:9px;font-weight:800;color:#333;letter-spacing:2px;text-transform:uppercase;padding:16px 20px 6px}
    .main{flex:1;padding:24px;overflow-y:auto}
    /* Cards */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
    .card-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--white);margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--white)}
    .stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
    .stat-delta{font-size:10px;color:var(--green);margin-top:4px}
    /* Table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-bottom:1px solid var(--border)}
    td{padding:10px 12px;border-bottom:1px solid #1a1a1a;vertical-align:middle}
    tr:hover td{background:#0d0d0d}
    /* Badges */
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800}
    .badge-green{background:#16a34a22;color:var(--green);border:1px solid #16a34a44}
    .badge-red{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
    .badge-amber{background:#f59e0b22;color:var(--amber);border:1px solid #f59e0b44}
    .badge-gray{background:#33333322;color:var(--muted);border:1px solid #333}
    /* Newsletter editor */
    textarea{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;outline:none;resize:vertical;min-height:200px}
    textarea:focus{border-color:var(--red)}
    label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:#111;padding:4px;border-radius:10px}
    .tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'Barlow',sans-serif}
    .tab.active{background:var(--red);color:#fff}
    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .divider{height:1px;background:var(--border);margin:16px 0}
    select{background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;width:100%;margin-bottom:10px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="pcn_config.js"></script>
<script src="pcn_storage.js"></script>

<script type="text/babel">
const {useState, useEffect, useCallback} = React;

const ADMIN_CODE = "PCN-ADMIN-2026";
const SUPABASE_URL = window.PCN_CONFIG?.supabaseUrl;
const SUPABASE_KEY = window.PCN_CONFIG?.supabaseKey;

const LOGO_URL = "https://www.pcn-nuerburgring.de/wp-content/uploads/2020/07/PCN-Logo_2020_internet.jpg";

// ── Supabase helper ──────────────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  if(!SUPABASE_URL) return {data:null,error:"No config"};
  const url = SUPABASE_URL+"/rest/v1/"+path;
  const headers = {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=representation",...(opts.headers||{})};
  try {
    const r = await fetch(url,{...opts,headers});
    const data = await r.json();
    if(!r.ok) return {data:null,error:data.message||r.statusText};
    return {data};
  } catch(e) { return {data:null,error:e.message}; }
}

// ── Main Admin App ───────────────────────────────────────────────────────────
function AdminApp() {
  const [authed, setAuthed] = useState(()=>sessionStorage.getItem("pcn_admin")==="1");
  const [code, setCode] = useState("");
  const [tab, setTab] = useState("dashboard");
  const [toast, setToast] = useState(null);
  const [members, setMembers] = useState([]);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);

  const toast_ = (msg,type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const login = () => {
    if(code.trim().toUpperCase()===ADMIN_CODE){ sessionStorage.setItem("pcn_admin","1"); setAuthed(true); loadAll(); }
    else toast_("Falscher Admin-Code","err");
  };

  const loadAll = useCallback(async()=>{
    setLoading(true);
    const [mRes, eRes] = await Promise.all([
      sbFetch("users?select=*&order=created_at.desc"),
      sbFetch("events?select=*&order=date.asc"),
    ]);
    if(mRes.data) setMembers(mRes.data);
    if(eRes.data) setEvents(eRes.data);
    setLoading(false);
  },[]);

  useEffect(()=>{ if(authed) loadAll(); },[authed]);

  if(!authed) return <Login code={code} setCode={setCode} login={login} toast_={toast_} toast={toast}/>;

  return (
    <div>
      {toast&&<div className={`toast`} style={{borderColor:toast.type==="err"?"#ef4444":undefined,color:toast.type==="err"?"#ef4444":undefined}}>{toast.msg}</div>}
      <header className="header">
        <div className="header-left">
          <img src={LOGO_URL} className="header-logo" alt="PCN" onError={e=>e.target.style.display="none"}/>
          <div>
            <div className="header-title">CLUBVERWALTUNG</div>
            <div className="header-badge">ADMIN</div>
          </div>
        </div>
        <div className="header-user">
          <span>Porsche Club Nürburgring</span>
          <button className="btn btn-sm btn-ghost" onClick={()=>{sessionStorage.removeItem("pcn_admin");setAuthed(false);}}>Abmelden</button>
        </div>
      </header>

      <div className="layout">
        <nav className="sidebar">
          <div className="nav-section">Übersicht</div>
          {[["dashboard","📊","Dashboard"],["members","👥","Mitglieder"],["payments","💳","Zahlungen"]].map(([id,ic,lb])=>(
            <div key={id} className={`nav-item ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{ic} {lb}</div>
          ))}
          <div className="nav-section">Events & Inhalt</div>
          {[["events","🏁","Events"],["newsletter","📬","Newsletter"],["newsfeed","📰","News-Feed"]].map(([id,ic,lb])=>(
            <div key={id} className={`nav-item ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{ic} {lb}</div>
          ))}
          <div className="nav-section">System</div>
          {[["settings","⚙️","Einstellungen"]].map(([id,ic,lb])=>(
            <div key={id} className={`nav-item ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{ic} {lb}</div>
          ))}
        </nav>

        <main className="main">
          {tab==="dashboard"&&<Dashboard members={members} events={events}/>}
          {tab==="members"&&<Members members={members} toast_={toast_} reload={loadAll}/>}
          {tab==="payments"&&<Payments members={members} toast_={toast_}/>}
          {tab==="events"&&<Events events={events} toast_={toast_} reload={loadAll}/>}
          {tab==="newsletter"&&<Newsletter toast_={toast_} members={members}/>}
          {tab==="newsfeed"&&<NewsFeed toast_={toast_}/>}
          {tab==="settings"&&<Settings toast_={toast_}/>}
        </main>
      </div>
    </div>
  );
}

// ── Login ────────────────────────────────────────────────────────────────────
function Login({code,setCode,login,toast_,toast}) {
  return (
    <div className="login-wrap">
      {toast&&<div className="toast" style={{borderColor:toast.type==="err"?"#ef4444":undefined,color:toast.type==="err"?"#ef4444":undefined}}>{toast.msg}</div>}
      <div className="login-card">
        <div className="login-logo-wrap">
          <img src={LOGO_URL} className="login-logo" alt="PCN" onError={e=>e.target.style.display="none"}/>
        </div>
        <div className="login-title">Club-Administration</div>
        <div className="login-sub" style={{marginBottom:20}}>Nur für autorisierte Vorstandsmitglieder</div>
        <label>Admin-Code</label>
        <input className="inp" type="password" placeholder="••••••••••••" value={code}
          onChange={e=>setCode(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&login()}/>
        <button className="btn" style={{marginTop:8}} onClick={login}>Anmelden →</button>
        <div style={{fontSize:11,color:"#333",textAlign:"center",marginTop:16}}>
          Powered by <span style={{color:"#C8A96E"}}>QAR.Gallery</span>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({members,events}) {
  const active = members.filter(m=>m.role==="member").length;
  const guests = members.filter(m=>m.role==="guest").length;
  const paid = members.filter(m=>m.beitrag_bezahlt).length;
  const nextEvents = events.filter(e=>new Date(e.date)>=new Date()).slice(0,3);
  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>📊 Dashboard</h2>
      <div className="stats-grid">
        {[
          {val:active,label:"Aktive Mitglieder",delta:"+2 diese Woche",color:"var(--green)"},
          {val:guests,label:"Gast-Accounts",delta:"",color:"var(--amber)"},
          {val:paid,label:"Beitrag bezahlt",delta:`${Math.round(paid/Math.max(active,1)*100)}%`,color:"var(--green)"},
          {val:events.length,label:"Events geplant",delta:"",color:"#6b7fff"},
        ].map(s=>(
          <div key={s.label} className="stat">
            <div className="stat-val" style={{color:s.color||"var(--white)"}}>{s.val}</div>
            <div className="stat-label">{s.label}</div>
            {s.delta&&<div className="stat-delta">{s.delta}</div>}
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-title">🏁 Nächste Events</div>
        {nextEvents.length===0?<div style={{color:"var(--muted)",fontSize:13}}>Keine Events geplant</div>:
        nextEvents.map(ev=>(
          <div key={ev.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1a1a1a"}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{ev.name}</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>{new Date(ev.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
            </div>
            <span className="badge badge-green">{ev.category||"Event"}</span>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-title">📬 Letzter Newsletter</div>
        <div style={{fontSize:13,color:"var(--muted)"}}>Newsletter Juli 2026 — Termine & Veranstaltungen</div>
        <div style={{fontSize:11,color:"#333",marginTop:4}}>Versendet: 09.07.2026 · Empfänger: {active} Mitglieder</div>
      </div>
    </div>
  );
}

// ── Members ──────────────────────────────────────────────────────────────────
function Members({members,toast_,reload}) {
  const [search,setSearch] = useState("");
  const [filter,setFilter] = useState("all");

  const filtered = members.filter(m=>{
    if(filter==="member"&&m.role!=="member") return false;
    if(filter==="guest"&&m.role!=="guest") return false;
    if(search&&!m.name?.toLowerCase().includes(search.toLowerCase())&&!m.email?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const updateStatus = async(id, role) => {
    const {error} = await sbFetch(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({role})});
    if(error) toast_(error,"err"); else { toast_("Status aktualisiert ✓"); reload(); }
  };

  const deleteMember = async(id,name) => {
    if(!confirm(`${name} wirklich löschen?`)) return;
    await sbFetch(`users?id=eq.${id}`,{method:"DELETE"});
    toast_("Mitglied gelöscht"); reload();
  };

  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>👥 Mitgliederverwaltung</h2>
      <div className="card">
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <input className="inp" placeholder="🔍 Name oder E-Mail suchen..." value={search}
            onChange={e=>setSearch(e.target.value)} style={{flex:1,margin:0}}/>
          <select style={{width:"auto",margin:0}} value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="all">Alle</option>
            <option value="member">Mitglieder</option>
            <option value="guest">Gäste</option>
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th>Mitglied</th><th>Nr.</th><th>Status</th><th>Beitrag</th><th>Seit</th><th>Aktionen</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(m=>(
              <tr key={m.id}>
                <td>
                  <div style={{fontWeight:600}}>{m.name||"—"}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{m.email}</div>
                </td>
                <td style={{fontSize:12,color:"var(--muted)"}}>{m.member_nr||"—"}</td>
                <td>
                  <span className={`badge ${m.role==="member"?"badge-green":m.role==="guest"?"badge-amber":"badge-gray"}`}>
                    {m.role==="member"?"Mitglied":m.role==="guest"?"Gast":"—"}
                  </span>
                </td>
                <td>
                  <span className={`badge ${m.beitrag_bezahlt?"badge-green":"badge-red"}`}>
                    {m.beitrag_bezahlt?"✓ Bezahlt":"✗ Offen"}
                  </span>
                </td>
                <td style={{fontSize:11,color:"var(--muted)"}}>
                  {m.created_at?new Date(m.created_at).toLocaleDateString("de-DE"):"—"}
                </td>
                <td>
                  <div style={{display:"flex",gap:6"}}>
                    {m.role==="guest"&&<button className="btn btn-sm btn-green" onClick={()=>updateStatus(m.id,"member")}>→ Mitglied</button>}
                    {m.role==="member"&&<button className="btn btn-sm btn-ghost" onClick={()=>updateStatus(m.id,"inactive")}>Sperren</button>}
                    <button className="btn btn-sm" style={{background:"#ef444433",color:"#ef4444",border:"1px solid #ef444444"}}
                      onClick={()=>deleteMember(m.id,m.name)}>✕</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{textAlign:"center",padding:"20px",color:"var(--muted)"}}>Keine Mitglieder gefunden</div>}
      </div>
    </div>
  );
}

// ── Payments ─────────────────────────────────────────────────────────────────
function Payments({members,toast_}) {
  const aktive = members.filter(m=>m.role==="member");
  const offen = aktive.filter(m=>!m.beitrag_bezahlt);
  const bezahlt = aktive.filter(m=>m.beitrag_bezahlt);
  const BEITRAG = 95; // EUR Jahresbeitrag

  const markPaid = async(id) => {
    await sbFetch(`users?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({beitrag_bezahlt:true})});
    toast_("Als bezahlt markiert ✓");
  };

  const exportCSV = () => {
    const rows = [["Name","E-Mail","Mitgliedsnr.","Status","Betrag"],...aktive.map(m=>[m.name,m.email,m.member_nr||"",m.beitrag_bezahlt?"Bezahlt":"Offen",BEITRAG+" EUR"])];
    const csv = rows.map(r=>r.join(";")).join("\n");
    const a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download = "PCN_Beitraege_2026.csv"; a.click();
    toast_("CSV exportiert ✓");
  };

  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>💳 Zahlungsverwaltung</h2>
      <div className="stats-grid">
        <div className="stat"><div className="stat-val" style={{color:"var(--green)"}}>{bezahlt.length}</div><div className="stat-label">Beitrag bezahlt</div><div className="stat-delta">€ {bezahlt.length*BEITRAG} eingegangen</div></div>
        <div className="stat"><div className="stat-val" style={{color:"#ef4444"}}>{offen.length}</div><div className="stat-label">Beitrag offen</div><div className="stat-delta">€ {offen.length*BEITRAG} ausstehend</div></div>
        <div className="stat"><div className="stat-val">{aktive.length}</div><div className="stat-label">Gesamt Mitglieder</div><div className="stat-delta">€ {aktive.length*BEITRAG} Soll</div></div>
      </div>
      <div className="card">
        <div className="card-title">
          <span>Offene Beiträge {new Date().getFullYear()}</span>
          <button className="btn btn-sm btn-ghost" onClick={exportCSV}>📥 CSV Export</button>
        </div>
        {offen.length===0?<div style={{color:"var(--muted)",fontSize:13}}>✓ Alle Beiträge bezahlt</div>:
        <table>
          <thead><tr><th>Mitglied</th><th>Nr.</th><th>Betrag</th><th>Aktion</th></tr></thead>
          <tbody>
            {offen.map(m=>(
              <tr key={m.id}>
                <td><div style={{fontWeight:600}}>{m.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{m.email}</div></td>
                <td style={{fontSize:12,color:"var(--muted)"}}>{m.member_nr||"—"}</td>
                <td><span style={{color:"#ef4444",fontWeight:700}}>€ {BEITRAG}</span></td>
                <td><button className="btn btn-sm btn-green" onClick={()=>markPaid(m.id)}>✓ Bezahlt</button></td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>
    </div>
  );
}

// ── Events ───────────────────────────────────────────────────────────────────
function Events({events,toast_,reload}) {
  const [form,setForm] = useState({name:"",date:"",location:"",category:"Clubabend",desc:"",maxParticipants:"",price:""});
  const [showForm,setShowForm] = useState(false);

  const save = async() => {
    if(!form.name||!form.date) return toast_("Name und Datum angeben","err");
    const {error} = await sbFetch("events",{method:"POST",body:JSON.stringify({...form,max_participants:parseInt(form.maxParticipants)||50,created_at:new Date().toISOString()})});
    if(error) toast_(error,"err"); else { toast_("Event erstellt ✓"); setShowForm(false); setForm({name:"",date:"",location:"",category:"Clubabend",desc:"",maxParticipants:"",price:""}); reload(); }
  };

  const del = async(id,name) => {
    if(!confirm(`Event "${name}" löschen?`)) return;
    await sbFetch(`events?id=eq.${id}`,{method:"DELETE"});
    toast_("Event gelöscht"); reload();
  };

  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>🏁 Events</h2>
      <div style={{marginBottom:16}}><button className="btn" style={{width:"auto",padding:"10px 20px"}} onClick={()=>setShowForm(!showForm)}>+ Neues Event</button></div>
      {showForm&&(
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">Neues Event anlegen</div>
          <div className="form-row">
            <div><label>Name *</label><input className="inp" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
            <div><label>Datum *</label><input className="inp" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
          </div>
          <div className="form-row">
            <div><label>Ort</label><input className="inp" value={form.location} onChange={e=>setForm(p=>({...p,location:e.target.value}))}/></div>
            <div><label>Kategorie</label>
              <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                {["Clubabend","Trackday","Ausfahrt","Rennsport","Saisonfahrt","Oldtimer"].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div><label>Max. Teilnehmer</label><input className="inp" type="number" value={form.maxParticipants} onChange={e=>setForm(p=>({...p,maxParticipants:e.target.value}))}/></div>
            <div><label>Preis</label><input className="inp" placeholder="z.B. € 95 oder Kostenlos" value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))}/></div>
          </div>
          <label>Beschreibung</label>
          <textarea value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} style={{minHeight:80}}/>
          <div style={{display:"flex",gap:10,marginTop:10}}>
            <button className="btn" style={{flex:1}} onClick={save}>Event erstellen ✓</button>
            <button className="btn btn-ghost" style={{flex:1,border:"1px solid var(--border)"}} onClick={()=>setShowForm(false)}>Abbrechen</button>
          </div>
        </div>
      )}
      <div className="card">
        <table>
          <thead><tr><th>Event</th><th>Datum</th><th>Ort</th><th>Kategorie</th><th>Aktion</th></tr></thead>
          <tbody>
            {events.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(ev=>(
              <tr key={ev.id}>
                <td style={{fontWeight:600}}>{ev.name}</td>
                <td style={{fontSize:12}}>{new Date(ev.date).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"})}</td>
                <td style={{fontSize:12,color:"var(--muted)"}}>{ev.location||"—"}</td>
                <td><span className="badge badge-gray">{ev.category||"—"}</span></td>
                <td><button className="btn btn-sm" style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444444"}} onClick={()=>del(ev.id,ev.name)}>✕</button></td>
              </tr>
            ))}
            {events.length===0&&<tr><td colSpan={5} style={{textAlign:"center",color:"var(--muted)",padding:"20px"}}>Keine Events</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Newsletter ───────────────────────────────────────────────────────────────
function Newsletter({toast_,members}) {
  const [subject,setSubject] = useState("Newsletter " + new Date().toLocaleDateString("de-DE",{month:"long",year:"numeric"}));
  const [body,setBody] = useState(`Liebe Mitglieder und Freunde des Porsche Club Nürburgring,\n\n`);
  const [preview,setPreview] = useState(false);
  const aktive = members.filter(m=>m.role==="member");

  const sendNewsletter = async() => {
    if(!subject.trim()||!body.trim()) return toast_("Betreff und Inhalt angeben","err");
    if(!confirm(`Newsletter an ${aktive.length} Mitglieder senden?`)) return;
    // In MVP: save to news table for in-app display
    await sbFetch("news",{method:"POST",body:JSON.stringify({
      title:subject, body, type:"newsletter", icon:"📬", pinned:true,
      created_at:new Date().toISOString(), author:"PCN Vorstand"
    })}).catch(()=>{});
    toast_(`Newsletter gespeichert — erscheint im News-Feed ✓`);
  };

  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>📬 Newsletter</h2>
      <div className="tabs">
        <button className={`tab ${!preview?"active":""}`} onClick={()=>setPreview(false)}>✏️ Verfassen</button>
        <button className={`tab ${preview?"active":""}`} onClick={()=>setPreview(true)}>👁 Vorschau</button>
      </div>
      {!preview?(
        <div className="card">
          <label>Betreff</label>
          <input className="inp" value={subject} onChange={e=>setSubject(e.target.value)}/>
          <label>Inhalt</label>
          <textarea value={body} onChange={e=>setBody(e.target.value)} style={{minHeight:320}}/>
          <div style={{display:"flex",gap:10,marginTop:14,alignItems:"center"}}>
            <button className="btn" style={{flex:2}} onClick={sendNewsletter}>
              📬 Im News-Feed veröffentlichen ({aktive.length} Mitglieder)
            </button>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:10}}>
            ℹ️ Newsletter erscheint sofort im Dashboard der App. E-Mail-Versand kann über Mailchimp / CleverReach angebunden werden.
          </div>
        </div>
      ):(
        <div className="card">
          <div style={{background:"#fff",borderRadius:8,padding:"24px",color:"#111"}}>
            <div style={{borderBottom:"3px solid #D5001C",paddingBottom:12,marginBottom:16}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:"#111"}}>Porsche Club Nürburgring</div>
              <div style={{fontSize:12,color:"#666"}}>pcn-nuerburgring.de</div>
            </div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>{subject}</div>
            <div style={{fontSize:14,lineHeight:1.8,color:"#222",whiteSpace:"pre-wrap"}}>{body}</div>
            <div style={{marginTop:24,paddingTop:12,borderTop:"1px solid #eee",fontSize:11,color:"#999"}}>
              Du erhältst diese E-Mail als Mitglied des Porsche Club Nürburgring e.V.
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{marginTop:16}}>
        <div className="card-title">📌 Letzter Newsletter (Juli 2026)</div>
        <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.7}}>
          <strong style={{color:"var(--white)"}}>Nürburgring Classic + Termine Juli/August</strong><br/>
          Versendet: 09.07.2026 · Empfänger: {aktive.length} Mitglieder<br/>
          Events: Bellmot Grand Prix, PCN TrackDay, Bodensee-Fahrt
        </div>
      </div>
    </div>
  );
}

// ── News-Feed ────────────────────────────────────────────────────────────────
function NewsFeed({toast_}) {
  const [title,setTitle] = useState("");
  const [body,setBody] = useState("");
  const [type,setType] = useState("news");
  const [pinned,setPinned] = useState(false);

  const publish = async() => {
    if(!title.trim()) return toast_("Titel angeben","err");
    await sbFetch("news",{method:"POST",body:JSON.stringify({
      title,body,type,icon:type==="news"?"📰":type==="tip"?"💡":"🎉",
      pinned,created_at:new Date().toISOString(),author:"PCN Vorstand"
    })}).catch(()=>{});
    toast_("Artikel veröffentlicht ✓");
    setTitle(""); setBody(""); setPinned(false);
  };

  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>📰 News-Feed</h2>
      <div className="card">
        <div className="card-title">Neuer Artikel</div>
        <div className="form-row" style={{marginBottom:10}}>
          <div>
            <label>Typ</label>
            <select value={type} onChange={e=>setType(e.target.value)}>
              <option value="news">📰 Neuigkeit</option>
              <option value="tip">💡 Tipp</option>
              <option value="welcome">🎉 Ankündigung</option>
              <option value="newsletter">📬 Newsletter</option>
            </select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:20}}>
            <input type="checkbox" id="pinned" checked={pinned} onChange={e=>setPinned(e.target.checked)} style={{width:16,height:16,accentColor:"var(--red)"}}/>
            <label htmlFor="pinned" style={{margin:0,cursor:"pointer"}}>Als NEU markieren</label>
          </div>
        </div>
        <label>Titel *</label>
        <input className="inp" value={title} onChange={e=>setTitle(e.target.value)} placeholder="z.B. Neue Kooperation mit Porsche Zentrum"/>
        <label>Inhalt</label>
        <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="Text des Artikels..." style={{minHeight:120}}/>
        <button className="btn" style={{marginTop:10}} onClick={publish}>📰 Veröffentlichen</button>
      </div>
    </div>
  );
}

// ── Settings ─────────────────────────────────────────────────────────────────
function Settings({toast_}) {
  return (
    <div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:20}}>⚙️ Einstellungen</h2>
      <div className="card">
        <div className="card-title">Club-Code</div>
        <label>Aktueller Beitritts-Code</label>
        <input className="inp" value="PCN2026" readOnly style={{fontFamily:"monospace",letterSpacing:2}}/>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>Wird bei der Mitglieder-Registrierung benötigt</div>
      </div>
      <div className="card">
        <div className="card-title">Jahresbeitrag</div>
        <label>Beitrag 2026 (EUR)</label>
        <input className="inp" type="number" defaultValue="95" style={{width:120}}/>
        <button className="btn" style={{width:"auto",padding:"10px 20px",marginTop:10}} onClick={()=>toast_("Gespeichert ✓")}>Speichern</button>
      </div>
      <div className="card">
        <div className="card-title">QAR.Gallery Anbindung</div>
        <div style={{fontSize:13,color:"var(--muted)"}}>Supabase: <span style={{color:"var(--green)"}}>✓ Verbunden</span></div>
        <div style={{fontSize:11,color:"#333",marginTop:4}}>App-URL: qar.gallery/pcn/</div>
      </div>
    </div>
  );
}

// ── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AdminApp));
</script>
