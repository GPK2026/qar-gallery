name: Health-Check

# Läuft alle 12 Stunden und prüft, ob die Plattform funktioniert.
# Findet Probleme bevor Mitglieder darüber stolpern.
#
# WICHTIG: Das Repo ist öffentlich — die Logs sind für jeden lesbar.
# Deshalb werden NIEMALS Daten ausgegeben, nur Statusmeldungen.

on:
  schedule:
    - cron: "0 6,18 * * *"     # 06:00 und 18:00 UTC
  workflow_dispatch:            # manuell auslösbar

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Datenbank und Policies prüfen
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SB_URL" ] || [ -z "$SB_KEY" ]; then
            echo "::error::Secrets fehlen — SUPABASE_URL und SUPABASE_ANON_KEY in den Repo-Settings hinterlegen"
            exit 1
          fi
          node .github/scripts/healthcheck.js

      - name: App erreichbar?
        run: |
          for url in \
            "https://qar.gallery/pcn/" \
            "https://qar.gallery/pcn/PCN_MVP.compiled.js" \
            "https://qar.gallery/pcn/pcn_storage.js" \
            "https://qar.gallery/pcn/admin.html"
          do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url")
            if [ "$code" != "200" ]; then
              echo "::error::$url antwortet mit $code"
              exit 1
            fi
            echo "✓ $(basename $url) erreichbar"
          done

      - name: Bei Fehler Issue anlegen
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🔴 Health-Check fehlgeschlagen";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "health-check",
            });
            const body = [
              "Der automatische Health-Check hat ein Problem gefunden.",
              "",
              `Lauf: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Nächste Schritte:",
              "1. Log oben öffnen und Fehlermeldung lesen",
              "2. Admin-Console → System → 🔬 Selbsttest ausführen",
              "3. Bei RLS-Fehlern: `pcn/fix_all_rls_policies.sql` in Supabase ausführen",
            ].join("\n");
            if (issues.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["health-check"],
              });
            }

      - name: Issue schließen wenn wieder grün
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "health-check",
            });
            for (const i of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: i.number,
                body: "✅ Health-Check wieder grün — automatisch geschlossen.",
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: i.number, state: "closed",
              });
            }
