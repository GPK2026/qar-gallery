<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="QAR Dashboard"/>
  <title>QAR.Gallery — Dashboard</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><text y='.85em' x='18' font-size='72' fill='%23D5001C'>Q</text></svg>"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{background:#0a0a0a;font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;color:#555;gap:14px;z-index:9999}
    #boot .ring{width:26px;height:26px;border:2px solid #222;border-top-color:#D5001C;border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    #boot .msg{font-size:12px;letter-spacing:1px}
    #boot .err{color:#D5001C;font-size:12px;max-width:300px;text-align:center;line-height:1.6}
  </style>
</head>
<body>
  <div id="boot">
    <div class="ring"></div>
    <div class="msg">Dashboard wird geladen…</div>
  </div>
  <div id="root"></div>

  <!-- Config: Supabase-Zugang (gemeinsam mit der PCN-App) -->
  <script src="../pcn/pcn_config.js?v=1784159464"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    // Boot-Fehler sichtbar machen statt weißer Seite
    window.addEventListener("error", function(e){
      var b = document.getElementById("boot");
      if(b) b.innerHTML = '<div class="err">Ladefehler:<br>' + (e.message||"unbekannt") + '</div>';
    });
  </script>

  <script src="qar_dashboard.compiled.js?v=1784159464"></script>

  <script>
    (function(){
      var boot = document.getElementById("boot");
      try {
        var mod = window.qar_dashboard;
        var App = mod && (mod.default || mod);
        if(!App) throw new Error("Dashboard-Modul nicht gefunden");
        ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
        if(boot) boot.remove();
      } catch(err) {
        if(boot) boot.innerHTML = '<div class="err">Start fehlgeschlagen:<br>' + err.message + '</div>';
        console.error(err);
      }
    })();
  </script>
</body>
</html>
